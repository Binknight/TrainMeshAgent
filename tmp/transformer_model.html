<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformer Model Architecture</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  body { margin: 0; display: flex; justify-content: center; background: #f5f5f5; font-family: 'Segoe UI', Arial, sans-serif; }
  text { user-select: none; }
</style>
</head>
<body>
<div class="container">
  <svg id="transformer" width="800" height="710"></svg>
</div>
<script>
const svg = d3.select("#transformer");

// Arrow image path (relative from tmp/)
const ARROW_IMG = "../static/assets/down_arrow_green.png";

// ========== LAYOUT CONSTANTS (compact) ==========
const CX = 400;              // center X
const BOX_W = 340;           // main box width
const NARROW_W = 200;        // narrow box width (Layer Norm, Add)
const BLOCK_W = 290;         // sub-block width (Attention, FFN)
const SUB_W = 210;           // inner sub-rect width
const H_SM = 28;             // small height (Layer Norm, Add)
const H_MD = 36;             // medium height (Embeddings, Output)
const H_ATTN = 100;          // Attention block height (3 sub-items)
const H_FFN = 120;           // FFN block height (4 sub-items)
const ARROW_S = 16;          // arrow image size

// Y positions (tight)
const Y_EMBED = 20;
const Y_TRANSFORMER = 72;
const Y_LN1 = 96;
const Y_ATTN = 138;
const Y_ADD1 = 250;
const Y_LN2 = 292;
const Y_FFN = 334;
const Y_ADD2 = 466;
const Y_TRANSFORMER_END = 518;
const Y_LN3 = 550;
const Y_OUTPUT = 592;

// ========== STACKED LAYER SHADOWS ==========
const N_STACK = 5;
for (let i = N_STACK; i >= 1; i--) {
  svg.append("rect")
    .attr("x", CX - BOX_W/2 + i * 3)
    .attr("y", Y_TRANSFORMER + i * 3)
    .attr("width", BOX_W)
    .attr("height", Y_TRANSFORMER_END - Y_TRANSFORMER)
    .attr("rx", 8)
    .attr("fill", "none")
    .attr("stroke", "#a0a0a0")
    .attr("stroke-width", 1.2)
    .attr("stroke-dasharray", "4 3")
    .attr("opacity", 1 - i * 0.16);
}

// ========== TRANSFORMER LAYER ==========
svg.append("rect")
  .attr("x", CX - BOX_W/2)
  .attr("y", Y_TRANSFORMER)
  .attr("width", BOX_W)
  .attr("height", Y_TRANSFORMER_END - Y_TRANSFORMER)
  .attr("rx", 8)
  .attr("fill", "#e8f0fe")
  .attr("stroke", "#1a73e8")
  .attr("stroke-width", 2.5);

svg.append("text")
  .attr("x", CX - BOX_W/2 + 12)
  .attr("y", Y_TRANSFORMER + 19)
  .text("Transformer Layer  (×N)")
  .attr("font-size", 14)
  .attr("font-weight", "bold")
  .attr("fill", "#1a73e8");

svg.append("text")
  .attr("x", CX + BOX_W/2 - 12)
  .attr("y", Y_TRANSFORMER + 19)
  .text("×N")
  .attr("font-size", 13)
  .attr("font-weight", "bold")
  .attr("fill", "#777")
  .attr("text-anchor", "end");

// ========== HELPER FUNCTIONS ==========
function drawBox(x, y, w, h, label, fill, stroke, fontSize, fontWeight, color) {
  const g = svg.append("g");
  g.append("rect")
    .attr("x", x).attr("y", y)
    .attr("width", w).attr("height", h)
    .attr("rx", 5)
    .attr("fill", fill)
    .attr("stroke", stroke)
    .attr("stroke-width", 2);
  g.append("text")
    .attr("x", x + w/2)
    .attr("y", y + h/2 + 1)
    .attr("text-anchor", "middle")
    .attr("dominant-baseline", "middle")
    .attr("font-size", fontSize)
    .attr("font-weight", fontWeight)
    .attr("fill", color)
    .text(label);
  return g;
}

function drawSubBlock(outerX, outerY, outerW, outerH, title, subItems, fill, stroke) {
  const g = svg.append("g");
  g.append("rect")
    .attr("x", outerX).attr("y", outerY)
    .attr("width", outerW).attr("height", outerH)
    .attr("rx", 5)
    .attr("fill", fill)
    .attr("stroke", stroke)
    .attr("stroke-width", 2);
  g.append("text")
    .attr("x", outerX + outerW/2)
    .attr("y", outerY + 13)
    .attr("text-anchor", "middle")
    .attr("font-size", 11)
    .attr("font-weight", "bold")
    .attr("fill", stroke)
    .text(title);

  const innerX = outerX + (outerW - SUB_W)/2;
  const innerStartY = outerY + 24;
  const innerH = 20;
  const innerGap = 4;

  subItems.forEach((item, i) => {
    const iy = innerStartY + i * (innerH + innerGap);
    g.append("rect")
      .attr("x", innerX).attr("y", iy)
      .attr("width", SUB_W).attr("height", innerH)
      .attr("rx", 3)
      .attr("fill", "#ffffff")
      .attr("stroke", stroke)
      .attr("stroke-width", 1)
      .attr("stroke-opacity", 0.5);
    g.append("text")
      .attr("x", innerX + SUB_W/2)
      .attr("y", iy + innerH/2 + 1)
      .attr("text-anchor", "middle")
      .attr("dominant-baseline", "middle")
      .attr("font-size", 10)
      .attr("fill", "#333")
      .text(item);
  });
  return g;
}

// Place arrow image centered at (cx, cy) with given size
function drawArrowImg(cx, cy, size) {
  svg.append("image")
    .attr("x", cx - size/2)
    .attr("y", cy - size/2)
    .attr("width", size)
    .attr("height", size)
    .attr("href", ARROW_IMG);
}

// Draw a line (for skip connections)
function drawLine(x1, y1, x2, y2, color, dash) {
  svg.append("line")
    .attr("x1", x1).attr("y1", y1)
    .attr("x2", x2).attr("y2", y2)
    .attr("stroke", color)
    .attr("stroke-width", 2)
    .attr("stroke-dasharray", dash || "none");
}

// ========== 1. EMBEDDINGS (outside) ==========
drawBox(CX - BOX_W/2, Y_EMBED, BOX_W, H_MD,
  "Position + Word Embeddings & Dropout",
  "#fff3cd", "#f0c030", 12, "bold", "#7a5d00");

// ========== 2. LAYER NORM 1 (inside transformer) ==========
drawBox(CX - NARROW_W/2, Y_LN1, NARROW_W, H_SM,
  "Layer Norm",
  "#d4edda", "#28a745", 12, "bold", "#155724");

// ========== 3. ATTENTION BLOCK ==========
drawSubBlock(CX - BLOCK_W/2, Y_ATTN, BLOCK_W, H_ATTN,
  "Multi-Head Self-Attention",
  ["Self Attention", "Linear (h → h)", "Dropout"],
  "#cce5ff", "#1a73e8");

// ========== 4. ADD 1 ==========
drawBox(CX - NARROW_W/2, Y_ADD1, NARROW_W, H_SM,
  "Add",
  "#e2e3e5", "#6c757d", 12, "bold", "#383d41");

// ========== 5. LAYER NORM 2 ==========
drawBox(CX - NARROW_W/2, Y_LN2, NARROW_W, H_SM,
  "Layer Norm",
  "#d4edda", "#28a745", 12, "bold", "#155724");

// ========== 6. FFN BLOCK ==========
drawSubBlock(CX - BLOCK_W/2, Y_FFN, BLOCK_W, H_FFN,
  "Feed-Forward Network",
  ["Linear (h → 4h)", "GeLU", "Linear (4h → h)", "Dropout"],
  "#f8d7da", "#dc3545");

// ========== 7. ADD 2 ==========
drawBox(CX - NARROW_W/2, Y_ADD2, NARROW_W, H_SM,
  "Add",
  "#e2e3e5", "#6c757d", 12, "bold", "#383d41");

// ========== 8. LAYER NORM 3 (outside) ==========
drawBox(CX - NARROW_W/2, Y_LN3, NARROW_W, H_SM,
  "Layer Norm",
  "#d4edda", "#28a745", 12, "bold", "#155724");

// ========== 9. OUTPUT ==========
drawBox(CX - BOX_W/2, Y_OUTPUT, BOX_W, H_MD,
  "Output Layer & Loss",
  "#fce4d6", "#ed7d31", 12, "bold", "#7a3d00");

// ========== TENSOR (left side, 4×4 square grid) ==========
const GRID_COLS = 4;
const GRID_ROWS = 4;
const TENSOR_W = 160;
const TENSOR_H = 160;
const TENSOR_X = 48;
const TENSOR_Y = Y_TRANSFORMER;
const CELL_W = TENSOR_W / GRID_COLS;
const CELL_H = TENSOR_H / GRID_ROWS;

// Tensor outer rect
svg.append("rect")
  .attr("x", TENSOR_X).attr("y", TENSOR_Y)
  .attr("width", TENSOR_W).attr("height", TENSOR_H)
  .attr("rx", 4)
  .attr("fill", "#e8daef")
  .attr("stroke", "#8e44ad")
  .attr("stroke-width", 2);

// Grid cells
for (let row = 0; row < GRID_ROWS; row++) {
  for (let col = 0; col < GRID_COLS; col++) {
    const cx = TENSOR_X + col * CELL_W;
    const cy = TENSOR_Y + row * CELL_H;
    const num = row * GRID_COLS + col + 1;
    // Cell rect
    svg.append("rect")
      .attr("x", cx).attr("y", cy)
      .attr("width", CELL_W).attr("height", CELL_H)
      .attr("fill", "none")
      .attr("stroke", "#8e44ad")
      .attr("stroke-width", 0.8)
      .attr("stroke-dasharray", "3 2")
      .attr("opacity", 0.6);
    // Label
    svg.append("text")
      .attr("x", cx + CELL_W/2)
      .attr("y", cy + CELL_H/2 + 1)
      .attr("text-anchor", "middle")
      .attr("dominant-baseline", "middle")
      .attr("font-size", 11)
      .attr("font-weight", "bold")
      .attr("fill", "#6c3483")
      .text(num);
  }
}

// Tensor title (above)
svg.append("text")
  .attr("x", TENSOR_X + TENSOR_W/2)
  .attr("y", TENSOR_Y - 10)
  .attr("text-anchor", "middle")
  .attr("font-size", 10)
  .attr("font-weight", "bold")
  .attr("fill", "#6c3483")
  .text("Tensor");

// Grid label (below)
svg.append("text")
  .attr("x", TENSOR_X + TENSOR_W/2)
  .attr("y", TENSOR_Y + TENSOR_H + 14)
  .attr("text-anchor", "middle")
  .attr("font-size", 9)
  .attr("fill", "#888")
  .text(`(${GRID_ROWS}×${GRID_COLS} TP)`);


// ========== MAIN FLOW ARROWS (PNG images between nodes) ==========
// Embeddings → Layer Norm 1
drawArrowImg(CX, Y_EMBED + H_MD + (Y_LN1 - Y_EMBED - H_MD)/2, ARROW_S);

// Layer Norm 1 → Attention
drawArrowImg(CX, Y_LN1 + H_SM + (Y_ATTN - Y_LN1 - H_SM)/2, ARROW_S);

// Attention → Add 1
drawArrowImg(CX, Y_ATTN + H_ATTN + (Y_ADD1 - Y_ATTN - H_ATTN)/2, ARROW_S);

// Add 1 → Layer Norm 2
drawArrowImg(CX, Y_ADD1 + H_SM + (Y_LN2 - Y_ADD1 - H_SM)/2, ARROW_S);

// Layer Norm 2 → FFN
drawArrowImg(CX, Y_LN2 + H_SM + (Y_FFN - Y_LN2 - H_SM)/2, ARROW_S);

// FFN → Add 2
drawArrowImg(CX, Y_FFN + H_FFN + (Y_ADD2 - Y_FFN - H_FFN)/2, ARROW_S);

// Add 2 → Layer Norm 3
drawArrowImg(CX, Y_ADD2 + H_SM + (Y_LN3 - Y_ADD2 - H_SM)/2, ARROW_S);

// Layer Norm 3 → Output
drawArrowImg(CX, Y_LN3 + H_SM + (Y_OUTPUT - Y_LN3 - H_SM)/2, ARROW_S);

// ========== SKIP (RESIDUAL) CONNECTIONS ==========
const skipColor = "#e37400";
const skipRight = CX + BOX_W/2 + 38;

// Skip 1: from between Embeddings & LN1 → to Add 1
const skip1StartY = Y_EMBED + H_MD + (Y_LN1 - Y_EMBED - H_MD) / 2;
const skip1EndX = CX + NARROW_W/2;
const skip1EndY = Y_ADD1 + H_SM/2;

// Path segments
drawLine(CX, skip1StartY, skipRight, skip1StartY, skipColor, "6 3");
drawLine(skipRight, skip1StartY, skipRight, skip1EndY, skipColor, "6 3");
drawLine(skipRight, skip1EndY, skip1EndX, skip1EndY, skipColor, "6 3");
// Arrow image at terminal
drawArrowImg(skip1EndX - 4, skip1EndY, ARROW_S);

// Residual label
svg.append("text")
  .attr("text-anchor", "middle")
  .attr("font-size", 9)
  .attr("fill", skipColor)
  .attr("font-style", "italic")
  .attr("transform", `translate(${skipRight + 10}, ${skip1StartY + (skip1EndY - skip1StartY)/2}) rotate(-90)`)
  .text("residual");

// Skip 2: from between Add1 & LN2 → to Add 2
const skip2StartY = Y_ADD1 + H_SM + (Y_LN2 - Y_ADD1 - H_SM) / 2;
const skip2EndX = CX + NARROW_W/2;
const skip2EndY = Y_ADD2 + H_SM/2;

drawLine(CX, skip2StartY, skipRight, skip2StartY, skipColor, "6 3");
drawLine(skipRight, skip2StartY, skipRight, skip2EndY, skipColor, "6 3");
drawLine(skipRight, skip2EndY, skip2EndX, skip2EndY, skipColor, "6 3");
drawArrowImg(skip2EndX - 4, skip2EndY, ARROW_S);

svg.append("text")
  .attr("text-anchor", "middle")
  .attr("font-size", 9)
  .attr("fill", skipColor)
  .attr("font-style", "italic")
  .attr("transform", `translate(${skipRight + 10}, ${skip2StartY + (skip2EndY - skip2StartY)/2}) rotate(-90)`)
  .text("residual");

// ========== LEGEND (bottom-left, single column, last row at transformer bottom) ==========
const legendX = TENSOR_X;
const legendItems = [
  { color: "#28a745", label: "Layer Normalization" },
  { color: "#1a73e8", label: "Attention Sub-Layer" },
  { color: "#dc3545", label: "Feed-Forward Sub-Layer" },
  { color: "#6c757d", label: "Residual Add" },
  { color: skipColor, label: "Skip Connection" },
  { color: "#8e44ad", label: "Tensor (TP-split)" },
];
const N_LEGEND = legendItems.length;
const LEGEND_ROW_H = 18;
// Last item bottom at Y_TRANSFORMER_END
const legendBaseY = Y_TRANSFORMER_END;
// Title is N_LEGEND+1 rows above the base
const legendTitleY = legendBaseY - (N_LEGEND + 1) * LEGEND_ROW_H;

svg.append("text")
  .attr("x", legendX)
  .attr("y", legendTitleY + 4)
  .text("Legend:")
  .attr("font-size", 10)
  .attr("font-weight", "bold")
  .attr("fill", "#333");

legendItems.forEach((item, i) => {
  const ly = legendTitleY + 14 + (i + 1) * LEGEND_ROW_H;
  svg.append("rect")
    .attr("x", legendX).attr("y", ly - 4)
    .attr("width", 10).attr("height", 10)
    .attr("rx", 2).attr("fill", item.color).attr("opacity", 0.8);
  svg.append("text")
    .attr("x", legendX + 15).attr("y", ly + 5)
    .attr("font-size", 9).attr("fill", "#555")
    .text(item.label);
});

</script>
</body>
</html>
