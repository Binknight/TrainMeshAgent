            // ── Chat rendering ──
            function formatContent(content) {
                if (typeof content !== "string") content = String(content);
                // Render markdown via marked, keeping it safe (marked escapes HTML by default)
                let html = marked.parse(content);
                // Highlight inline JSON blocks with special styling
                html = html.replace(/(\{[\s\S]*?"[\s\S]*?\})/g, (m) => {
                    try {
                        JSON.parse(m);
                        return `<span class="json-block">${m}</span>`;
                    } catch {
                        return m;
                    }
                });
                return html;
            }

            function addMessage(role, content, extraClass = "") {
                const container = document.getElementById("chat-messages");
                const labelMap = {
                    user: "您",
                    agent: "Agent",
                    system: "系统",
                    error: "错误",
                    tool: "工具",
                    mesh: "生成",
                };
                const label = labelMap[role] || "Agent";
                const side = role === "user" ? "right" : "left";
                const group = document.createElement("div");
                group.className = `msg-group ${side} fade-in`;
                group.innerHTML = `
    <span class="msg-label ${role}">${label}</span>
    <div class="msg-bubble ${role} ${extraClass}">${formatContent(content)}</div>`;
                container.appendChild(group);
                container.scrollTop = container.scrollHeight;
                return group;
            }

            function addThinking() {
                const container = document.getElementById("chat-messages");
                const group = document.createElement("div");
                group.className = "msg-group fade-in";
                group.id = "thinking-group";
                group.innerHTML = `
    <span class="msg-label agent">Agent</span>
    <div class="msg-bubble agent"><div class="thinking-dots"><span></span><span></span><span></span></div></div>`;
                container.appendChild(group);
                container.scrollTop = container.scrollHeight;
                return group;
            }

            function removeThinking() {
                const el = document.getElementById("thinking-group");
                if (el) el.remove();
            }

            function setStatus(text) {
                document.getElementById("status-text").textContent = text;
            }

            // ── SSE Streaming ──
            async function sendMessage(text, extraParams) {
                const input =
                    text || document.getElementById("chat-input").value.trim();
                if (!input || isStreaming) return;
                if (!text) document.getElementById("chat-input").value = "";

                isStreaming = true;
                document.getElementById("btn-send").disabled = true;
                setStatus("thinking");

                await ensureSession();
                addMessage("user", input);
                addThinking();

                try {
                    var body = { session_id: sessionId, message: input };
                    if (extraParams) Object.assign(body, extraParams);
                    const resp = await fetch(`${API}/chat/stream`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(body),
                    });

                    if (!resp.ok) {
                        removeThinking();
                        addMessage("error", `请求失败: HTTP ${resp.status}`);
                        return;
                    }

                    // Sync session id from server response header (safety net)
                    const serverSid = resp.headers.get("X-Session-Id");
                    if (serverSid && serverSid !== sessionId) {
                        sessionId = serverSid;
                        document.getElementById(
                            "session-id-display",
                        ).textContent = sessionId;
                        const saved = JSON.parse(
                            localStorage.getItem("mesh_session") || "{}",
                        );
                        localStorage.setItem(
                            "mesh_session",
                            JSON.stringify({
                                id: sessionId,
                                boot: saved.boot || "",
                            }),
                        );
                    }

                    const reader = resp.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = "";
                    let eventType = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });

                        const lines = buffer.split("\n");
                        buffer = lines.pop() || "";

                        for (const line of lines) {
                            if (line.startsWith("event: ")) {
                                eventType = line.slice(7).trim();
                            } else if (line.startsWith("data: ")) {
                                const dataStr = line.slice(6);
                                if (!dataStr) continue;
                                try {
                                    const data = JSON.parse(dataStr);
                                    await handleSSEEvent(eventType, data);
                                } catch (e) {
                                    console.warn(
                                        "SSE parse error:",
                                        e,
                                        dataStr,
                                    );
                                }
                            }
                        }
                    }
                } catch (e) {
                    removeThinking();
                    addMessage("error", `连接异常: ${e.message}`);
                } finally {
                    isStreaming = false;
                    document.getElementById("btn-send").disabled = false;
                    document.getElementById("chat-input").focus();
                    setStatus("idle");
                }
            }

            async function handleSSEEvent(type, data) {
                removeThinking();
                switch (type) {
                    case "thinking":
                        setStatus("thinking");
                        addMessage("agent", data.message || "正在思考...");
                        break;
                    case "tool_call":
                        setStatus("calling");
                        break;
                    case "guard_check":
                        setStatus("validating");
                        const passed = data.data?.passed;
                        const errs = data.data?.errors || [];
                        const warns = data.data?.warnings || [];
                        const guardMsg = passed
                            ? "✅ 护栏校验通过"
                            : "❌ " + errs.join("; ");
                        addMessage(
                            passed ? "system" : "error",
                            guardMsg +
                                (warns.length
                                    ? "\n⚠️ " + warns.join("; ")
                                    : ""),
                        );
                        if (!passed) {
                            // guard failed: mark step 1 for re-input
                            updateWorkflowNode("params", "failed");
                            setStatus("error");
                        }
                        break;
                    case "mesh_json":
                        setStatus("generated");
                        const topoData = data.data || data;
                        const topoSummary =
                            "📦 " +
                            (topoData.name || "") +
                            "\n节点数: " +
                            (topoData.total_nodes || 0) +
                            "  |  DP×TP×PP = " +
                            (topoData.dp_size || 0) +
                            "×" +
                            (topoData.tp_size || 0) +
                            "×" +
                            (topoData.pp_size || 0) +
                            "\n通信域: dp=" +
                            (topoData.comm_dp_groups != null
                                ? topoData.comm_dp_groups
                                : (topoData.communication_groups?.dp || [])
                                      .length) +
                            "  tp=" +
                            (topoData.comm_tp_groups != null
                                ? topoData.comm_tp_groups
                                : (topoData.communication_groups?.tp || [])
                                      .length) +
                            "  pp=" +
                            (topoData.comm_pp_groups != null
                                ? topoData.comm_pp_groups
                                : (topoData.communication_groups?.pp || [])
                                      .length);
                        _pendingMeshList.push(topoData);
                        // Workflow state and canvas rendering are orchestrated in 'done' handler
                        break;
                    case "model_json":
                        setStatus("generated");
                        const modelPayload = data.data || data;
                        if (!modelPayload._role) {
                            var modelName = (
                                modelPayload.name || ""
                            ).toLowerCase();
                            if (
                                modelName.indexOf("原始") !== -1 ||
                                modelName.indexOf("original") !== -1
                            ) {
                                modelPayload._role = "original";
                            } else if (
                                modelName.indexOf("等效") !== -1 ||
                                modelName.indexOf("equivalent") !== -1
                            ) {
                                modelPayload._role = "equivalent";
                            }
                        }
                        const cfg = modelPayload.config || {};
                        const comp = modelPayload.computed || {};
                        const modelSummary =
                            "🧠 " +
                            (modelPayload.type || "transformer_model") +
                            "  ·  " +
                            (modelPayload.layers_count || 0) +
                            " 层\n" +
                            "d_model=" +
                            (cfg.d_model || "—") +
                            "  heads=" +
                            (cfg.num_heads || "—") +
                            "  d_ffn=" +
                            (cfg.d_ffn || "—") +
                            "  params=" +
                            (comp.total_params_billions || "—");
                        addMessage("agent", modelSummary, "model");
                        _pendingModelList.push(modelPayload);
                        // model is completed later by loadModelData after topology parent completes
                        break;
                    case "equiv_formula_line":
                        setStatus("responding");
                        if (typeof _appendFormulaLine === "function") {
                            _appendFormulaLine(data.section, data.line);
                        }
                        if (data.section_done) {
                            var subMap = {
                                strategy: "equiv_calc_sub1",
                                metrics: "equiv_calc_sub2",
                                formula: "equiv_calc_sub3",
                            };
                            var subId = subMap[data.section];
                            if (subId) updateWorkflowNode(subId, "completed");
                        }
                        break;
                    case "message":
                        setStatus("responding");
                        addMessage("agent", data.message || "");
                        break;
                    case "sim_data":
                        const simPayload = data.data || data;
                        if (simPayload.original && simPayload.original.cards) {
                            meshActualOrig = {};
                            simPayload.original.cards.forEach(function (c) {
                                meshActualOrig[c.global_rank] = c;
                            });
                        }
                        if (
                            simPayload.equivalent &&
                            simPayload.equivalent.cards
                        ) {
                            meshActualEq = {};
                            simPayload.equivalent.cards.forEach(function (c) {
                                meshActualEq[c.global_rank] = c;
                            });
                        }
                        if (
                            (simPayload.original || simPayload.equivalent) &&
                            (meshOriginal || meshEquivalent)
                        ) {
                            meshRebuild();
                        }
                        // Defer workflow update to done handler for canvas sync
                        _simCompleted = true;
                        _pendingSimData = true;
                        break;
                    case "done":
                        await handleDone(data.data || { stage: "auto" });
                        break;
                    case "workflow_state":
                        // Defer sync until done handler finishes staged canvas rendering
                        if (data.data) _pendingWorkflowState = data.data;
                        break;
                    case "error":
                        setStatus("error");
                        addMessage(
                            "error",
                            data.message || data.data?.error || "未知错误",
                        );
                        // mark the current active (non-completed) requiresConfirm node as failed
                        WORKFLOW_STEPS.forEach(function (s) {
                            if (
                                !s.disabled &&
                                workflowNodeStates[s.id] === "active"
                            ) {
                                updateWorkflowNode(s.id, "failed");
                            }
                        });
                        break;
                }
            }

            // ── D3 Mesh Topology Rendering — see static/topo-renderer.js ──

            function syncWorkflowFromLoadedData() {
                var hasTopology = !!(meshOriginal || meshEquivalent);
                var hasOrigTopo = !!meshOriginal;
                var hasEqTopo = !!meshEquivalent;
                var hasModel = !!(modelOriginal || modelEquivalent);
                var hasSimulation = !!(
                    (typeof meshActualOrig !== "undefined" &&
                        Object.keys(meshActualOrig || {}).length) ||
                    (typeof meshActualEq !== "undefined" &&
                        Object.keys(meshActualEq || {}).length)
                );

                if (hasSimulation && hasModel && hasTopology) {
                    updateWorkflowNode("params", "completed");
                    _syncEquivCalcSubsteps(true, true);
                    updateWorkflowNode("equiv_gen", "completed");
                    updateWorkflowNode("simulation", "completed");
                    if (workflowNodeStates["comparison"] !== "completed") {
                        updateWorkflowNode("comparison", "active");
                    }
                } else if (hasModel && hasTopology) {
                    updateWorkflowNode("params", "completed");
                    _syncEquivCalcSubsteps(hasOrigTopo, hasEqTopo);
                    if (hasEqTopo) {
                        updateWorkflowNode("equiv_gen", "completed");
                        if (workflowNodeStates["simulation"] !== "completed") {
                            updateWorkflowNode("simulation", "active");
                        }
                    } else if (
                        workflowNodeStates["equiv_calc"] !== "completed"
                    ) {
                        updateWorkflowNode("equiv_calc", "active");
                    }
                } else if (hasTopology) {
                    updateWorkflowNode("params", "completed");
                    if (hasEqTopo) {
                        _syncEquivCalcSubsteps(true, true);
                        updateWorkflowNode("equiv_gen", "completed");
                        if (workflowNodeStates["simulation"] !== "completed") {
                            updateWorkflowNode("simulation", "active");
                        }
                    } else if (hasOrigTopo) {
                        _syncEquivCalcSubsteps(true, false);
                        updateWorkflowNode("equiv_calc", "active");
                    }
                }
            }

            function switchCanvasTab(tabName) {
                // Persist active tab across refreshes
                try { sessionStorage.setItem("activeCanvasTab", tabName); } catch (e) {}
                // Enable simulation tab button once simulation is available
                if (tabName === "simulation") {
                    var simTabBtn =
                        document.getElementById("tab-btn-simulation");
                    if (simTabBtn) simTabBtn.disabled = false;
                }

                document.querySelectorAll(".canvas-tab").forEach(function (t) {
                    t.classList.toggle("active", t.getAttribute("data-tab") === tabName);
                });
                document.querySelectorAll(".canvas-tab-panel").forEach(function (p) {
                    p.classList.toggle("active", p.id === "tab-panel-" + tabName);
                });

                // Render AFTER panel switch so containers have correct dimensions
                if (tabName === "simulation" && (meshOriginal || meshEquivalent)) {
                    _showActualData = true;
                    if (typeof canvasRebuild === "function") canvasRebuild("#sim-canvas-section");
                    if (typeof canvasRecenter === "function") canvasRecenter("#sim-canvas-section");
                    _renderSimResults();
                }

                if (tabName === "modeling") {
                    _showActualData = false;
                    window._renderMode = null;
                    if ((meshOriginal || meshEquivalent) && typeof canvasRebuild === "function") {
                        canvasRebuild();
                        if (typeof canvasRecenter === "function") canvasRecenter();
                    }
                }

                // Keep right panel visible on all tabs
                var simBtn = document.getElementById("btn-start-sim");
                if (simBtn)
                    simBtn.style.display = tabName === "modeling" ? "" : "none";
            }


            function genMockWorkload(pinnedRank) {
                var ops = []; // flat op list (timeline + table)
                var t = 0; // current time in microseconds

                var B = 8,
                    S = 4096,
                    d_model = 4096,
                    d_ffn = 14336,
                    num_heads = 32,
                    d_head = 128,
                    V = 128256;
                var num_layers = 2;

                // Extract TP/PP index from pinned rank (defaults to 0 if not set)
                var rk = pinnedRank || {};
                var myTp = rk.tpIdx != null ? rk.tpIdx : 0;
                var myPp = rk.ppIdx != null ? rk.ppIdx : 0;
                var myDp = rk.dpIdx != null ? rk.dpIdx : 0;
                var globalRank = rk.globalRank != null ? rk.globalRank : 0;
                var tp_size = rk.tpSize != null ? rk.tpSize : 2;
                var dp_size = rk.dpSize != null ? rk.dpSize : 2;
                var pp_size = rk.ppSize != null ? rk.ppSize : 2;

                function fmtShape(arr) {
                    return "[" + arr.join(",") + "]";
                }

                // helpers to add ops with realistic durations
                function addCompute(
                    name,
                    stage,
                    shapeIn,
                    shapeOut,
                    dtype,
                    flopsG,
                    additional,
                ) {
                    var dur = Math.round(
                        flopsG * 5.2 + Math.random() * flopsG * 0.6,
                    ); // ~5.2 us per GFLOP
                    ops.push({
                        operator_name: name,
                        comm_type: "computation",
                        stage: stage,
                        data_shape:
                            fmtShape(shapeIn) + " → " + fmtShape(shapeOut),
                        data_type: dtype,
                        data_size: null,
                        comm_group: null,
                        comm_group_size: null,
                        comm_name: null,
                        algo_name: null,
                        dst: null,
                        src: null,
                        additional: additional || "matmul",
                        nonblock: 0,
                        start_time: t,
                        end_time: t + dur,
                        duration: dur,
                        _elapsed_time: dur,
                    });
                    t += dur;
                    return dur;
                }

                function addComm(
                    commType,
                    stage,
                    commGroup,
                    groupSize,
                    msgBytes,
                    additional,
                    algo,
                ) {
                    // realistic comm time: ~0.5 us/byte for small msgs, improving with size
                    var baseLatency =
                        commType === "broadcast"
                            ? 8
                            : commType === "all_reduce"
                              ? 18
                              : 12;
                    var bwUsPerByte = 0.00035;
                    var dur = Math.round(
                        baseLatency +
                            msgBytes * bwUsPerByte +
                            Math.random() * 5,
                    );
                    ops.push({
                        operator_name: commType,
                        comm_type: commType,
                        stage: stage,
                        data_shape: null,
                        data_type: null,
                        data_size: msgBytes,
                        comm_group: commGroup,
                        comm_group_size: groupSize,
                        comm_name: commType,
                        algo_name: algo || "ring",
                        dst: null,
                        src: null,
                        additional: additional || algo || "ring",
                        nonblock: commType === "all_reduce" ? 0 : 1, // all_reduce often blocking
                        start_time: t,
                        end_time: t + dur,
                        duration: dur,
                        _elapsed_time: dur,
                    });
                    t += dur;
                    return dur;
                }

                // ═══ init stage ═══
                addComm(
                    "all_gather",
                    "init",
                    "tp_group",
                    tp_size,
                    d_model * d_model * 2,
                    "weight-gather",
                    "ring",
                );
                addComm(
                    "broadcast",
                    "init",
                    "dp_group",
                    dp_size,
                    128,
                    "seed-sync",
                    null,
                );

                // ═══ forward layers ═══
                for (var li = 0; li < num_layers; li++) {
                    var stageFwd = "forward/layer" + li;

                    // ATTN block
                    addCompute(
                        "qkv_projection",
                        stageFwd,
                        [B, S, d_model],
                        [B, S, 3 * d_model],
                        "bf16",
                        75.5,
                        "linear",
                    );
                    addComm(
                        "all_reduce",
                        stageFwd,
                        "tp_group",
                        tp_size,
                        B * S * 3 * d_model * 2,
                        "qkv-sync",
                        "ring",
                    );
                    addCompute(
                        "attention_scores",
                        stageFwd,
                        [B, num_heads, S, d_head],
                        [B, num_heads, S, d_head],
                        "bf16",
                        50.3,
                        "bmm",
                    );
                    addCompute(
                        "attention_softmax",
                        stageFwd,
                        [B, num_heads, S, S],
                        [B, num_heads, S, S],
                        "fp32",
                        8.4,
                        "softmax",
                    );
                    addCompute(
                        "attention_context",
                        stageFwd,
                        [B, num_heads, S, d_head],
                        [B, S, d_model],
                        "bf16",
                        50.3,
                        "bmm",
                    );
                    addComm(
                        "reduce_scatter",
                        stageFwd,
                        "tp_group",
                        tp_size,
                        B * S * d_model * 2,
                        "attn-out-sync",
                        "ring",
                    );
                    addCompute(
                        "output_projection",
                        stageFwd,
                        [B, S, d_model],
                        [B, S, d_model],
                        "bf16",
                        25.2,
                        "linear",
                    );

                    // FFN block
                    addCompute(
                        "ffn_gate_proj",
                        stageFwd,
                        [B, S, d_model],
                        [B, S, d_ffn],
                        "bf16",
                        100.7,
                        "linear",
                    );
                    addCompute(
                        "ffn_up_proj",
                        stageFwd,
                        [B, S, d_model],
                        [B, S, d_ffn],
                        "bf16",
                        100.7,
                        "linear",
                    );
                    addCompute(
                        "ffn_activation",
                        stageFwd,
                        [B, S, d_ffn],
                        [B, S, d_ffn],
                        "fp32",
                        6.2,
                        "silu",
                    );
                    addComm(
                        "all_reduce",
                        stageFwd,
                        "tp_group",
                        tp_size,
                        B * S * d_ffn * 2 * 2,
                        "ffn-sync",
                        "ring",
                    );
                    addCompute(
                        "ffn_down_proj",
                        stageFwd,
                        [B, S, d_ffn],
                        [B, S, d_model],
                        "bf16",
                        100.7,
                        "linear",
                    );

                    // inter-layer dp gradient sync (simulated during forward pass for overlap)
                    if (li < num_layers - 1) {
                        addComm(
                            "all_reduce",
                            stageFwd,
                            "dp_group",
                            dp_size,
                            d_model * d_model * 2 * 6,
                            "grad-prefetch",
                            "ring",
                        );
                    }
                }

                // ── forward/output ──
                addCompute(
                    "final_layer_norm",
                    "forward/output",
                    [B, S, d_model],
                    [B, S, d_model],
                    "fp32",
                    1.5,
                    "rms_norm",
                );
                addCompute(
                    "lm_head",
                    "forward/output",
                    [B, S, d_model],
                    [B, S, V],
                    "bf16",
                    105.4,
                    "linear",
                );
                addCompute(
                    "cross_entropy_loss",
                    "forward/output",
                    [B, S, V],
                    [1],
                    "fp32",
                    0.8,
                    "loss",
                );

                // ═══ backward layers (reverse order) ═══
                for (var li = num_layers - 1; li >= 0; li--) {
                    var stageBwd = "backward/layer" + li;

                    addCompute(
                        "loss_grad",
                        stageBwd,
                        [1],
                        [B, S, V],
                        "fp32",
                        1.6,
                        "grad",
                    );
                    addCompute(
                        "lm_head_grad",
                        stageBwd,
                        [B, S, V],
                        [B, S, d_model],
                        "bf16",
                        210.8,
                        "linear-grad",
                    );

                    // FFN grad
                    addComm(
                        "all_reduce",
                        stageBwd,
                        "tp_group",
                        tp_size,
                        B * S * d_model * 2,
                        "ffn-grad-input-sync",
                        "ring",
                    );
                    addCompute(
                        "ffn_down_grad",
                        stageBwd,
                        [B, S, d_model],
                        [B, S, d_ffn],
                        "bf16",
                        201.4,
                        "linear-grad",
                    );
                    addCompute(
                        "ffn_activation_grad",
                        stageBwd,
                        [B, S, d_ffn],
                        [B, S, d_ffn],
                        "fp32",
                        12.4,
                        "silu-grad",
                    );
                    addCompute(
                        "ffn_up_grad",
                        stageBwd,
                        [B, S, d_ffn],
                        [B, S, d_model],
                        "bf16",
                        201.4,
                        "linear-grad",
                    );
                    addCompute(
                        "ffn_gate_grad",
                        stageBwd,
                        [B, S, d_ffn],
                        [B, S, d_model],
                        "bf16",
                        201.4,
                        "linear-grad",
                    );

                    // ATTN grad
                    addComm(
                        "reduce_scatter",
                        stageBwd,
                        "tp_group",
                        tp_size,
                        B * S * d_model * 2,
                        "attn-grad-sync",
                        "ring",
                    );
                    addCompute(
                        "out_proj_grad",
                        stageBwd,
                        [B, S, d_model],
                        [B, S, d_model],
                        "bf16",
                        50.4,
                        "linear-grad",
                    );
                    addCompute(
                        "attention_context_grad",
                        stageBwd,
                        [B, S, d_model],
                        [B, num_heads, S, d_head],
                        "bf16",
                        100.6,
                        "bmm-grad",
                    );
                    addCompute(
                        "attention_softmax_grad",
                        stageBwd,
                        [B, num_heads, S, S],
                        [B, num_heads, S, S],
                        "fp32",
                        16.8,
                        "softmax-grad",
                    );
                    addCompute(
                        "attention_scores_grad",
                        stageBwd,
                        [B, num_heads, S, d_head],
                        [B, num_heads, S, d_head],
                        "bf16",
                        100.6,
                        "bmm-grad",
                    );
                    addComm(
                        "all_reduce",
                        stageBwd,
                        "tp_group",
                        tp_size,
                        B * S * d_model * 2 * 3,
                        "qkv-grad-sync",
                        "ring",
                    );
                    addCompute(
                        "qkv_proj_grad",
                        stageBwd,
                        [B, S, 3 * d_model],
                        [B, S, d_model],
                        "bf16",
                        151.0,
                        "linear-grad",
                    );
                }

                // ── backward/output ──
                addCompute(
                    "final_ln_grad",
                    "backward/output",
                    [B, S, d_model],
                    [B, S, d_model],
                    "fp32",
                    3.0,
                    "rms_norm-grad",
                );

                // ═══ step ═══
                addComm(
                    "all_reduce",
                    "step",
                    "dp_group",
                    dp_size,
                    d_model * d_model * 2 * 6 * num_layers,
                    "grad-avg",
                    "ring",
                );
                addCompute(
                    "optimizer_step",
                    "step",
                    [d_model, d_model],
                    [d_model, d_model],
                    "fp32",
                    12.8,
                    "adamw",
                );

                // ── Vary ops by rank: TP index affects comm duration, PP stage offsets layers ──
                var ppLayerOffset = myPp * num_layers;
                for (var oi = 0; oi < ops.length; oi++) {
                    var o2 = ops[oi];
                    if (o2.stage.indexOf("/layer") >= 0) {
                        var parts = o2.stage.split("/layer");
                        var origLayer = parseInt(parts[1]) || 0;
                        o2.stage =
                            parts[0] + "/layer" + (origLayer + ppLayerOffset);
                    }
                    if (
                        o2.comm_type === "all_reduce" ||
                        o2.comm_type === "reduce_scatter"
                    ) {
                        o2.duration = Math.round(
                            o2.duration * (0.9 + myTp * 0.07),
                        );
                        o2._elapsed_time = o2.duration;
                    }
                }

                // Build per-stage summary for the load-sequence chart
                var stageMap = {};
                ops.forEach(function (o) {
                    var key = o.stage;
                    if (!stageMap[key])
                        stageMap[key] = {
                            stage: key,
                            compute_us: 0,
                            comm_us: 0,
                            commBreakdown: {},
                        };
                    if (o.comm_type === "computation")
                        stageMap[key].compute_us += o.duration;
                    else {
                        stageMap[key].comm_us += o.duration;
                        var ct = o.comm_type;
                        stageMap[key].commBreakdown[ct] =
                            (stageMap[key].commBreakdown[ct] || 0) + o.duration;
                    }
                });

                var loadSeq = [];
                var stageOrder = [];
                ops.forEach(function (o) {
                    if (stageOrder.indexOf(o.stage) < 0)
                        stageOrder.push(o.stage);
                });
                stageOrder.forEach(function (s) {
                    loadSeq.push(stageMap[s]);
                });

                // ── HBM Memory breakdown (per-GPU, realistic for d_model=4096 training) ──
                // Vary by TP (weights/grad/opt sharded) and PP (activation per stage)
                var tpFactor = myTp / Math.max(1, tp_size);
                var ppFactor = myPp / Math.max(1, pp_size);
                var baseWeights = 13.82;
                var baseGradients = 13.82;
                var baseOptimizer = 27.64;
                var baseActivations = 21.45;
                var baseCommBuffer = 8.3;

                // TP sharding: each TP rank holds ~1/tp of weight/grad/optimizer state
                var tpDiv = Math.max(1, tp_size);
                var tpScale = 1.0 / tpDiv + (tpFactor - 0.5 / tpDiv) * 0.15; // small per-rank jitter

                // PP: activation memory varies by stage (early/late stages differ)
                var ppScale = 0.85 + ppFactor * 0.3;

                // Comm buffer: edge PP stages may need more buffer
                var commScale =
                    myPp === 0 || myPp === pp_size - 1 ? 1.15 : 0.92;

                var hbm = {
                    weights: parseFloat((baseWeights * tpScale).toFixed(2)),
                    gradients: parseFloat((baseGradients * tpScale).toFixed(2)),
                    optimizer: parseFloat((baseOptimizer * tpScale).toFixed(2)),
                    activations: parseFloat(
                        (baseActivations * ppScale).toFixed(2),
                    ),
                    comm_buffer: parseFloat(
                        (baseCommBuffer * commScale).toFixed(2),
                    ),
                };
                hbm.total = parseFloat(
                    (
                        hbm.weights +
                        hbm.gradients +
                        hbm.optimizer +
                        hbm.activations +
                        hbm.comm_buffer
                    ).toFixed(1),
                );

                return { ops: ops, loadSeq: loadSeq, totalUs: t, hbm: hbm };
            }

            function getPinnedTopo() {
                if (!meshPinnedRank) return null;
                return meshPinnedRank.side === "orig" ? meshOriginal : meshEquivalent;
            }


            function _renderSideDetail(prefix, rankInfo) {
                var _resultsRenderedBackup = _resultsRendered;
                _resultsRendered = false;
                if (rankInfo) {
                    meshPinnedRank = { side: "orig", globalRank: rankInfo.globalRank };
                }
                _oldRenderResults(prefix);
                _resultsRendered = _resultsRenderedBackup;
            }

            function _oldRenderResults(prefix) {
                _resultsRendered = false;

                var rankInfo = null;
                if (meshPinnedRank) {
                    var topo = getPinnedTopo();
                    if (topo) {
                        var ranksPerDp = topo.tp * topo.pp;
                        var gr = meshPinnedRank.globalRank;
                        rankInfo = {
                            globalRank: gr,
                            dpIdx: Math.floor(gr / ranksPerDp),
                            ppIdx: Math.floor((gr % ranksPerDp) / topo.tp),
                            tpIdx: (gr % ranksPerDp) % topo.tp,
                            tpSize: topo.tp,
                            ppSize: topo.pp,
                            dpSize: topo.dp,
                        };
                    }
                }
                var data = genMockWorkload(rankInfo);

                // ═══ Section 0: HBM Memory 统计 — vertical bar chart (highest priority) ═══
                (function () {
                    var container = document.getElementById(prefix + "-hbm");
                    if (!container) return;

                    var categories = [
                        { key: "weights", label: "权重", color: "#39bae6" },
                        { key: "gradients", label: "梯度", color: "#ff8f40" },
                        { key: "optimizer", label: "优化器", color: "#baa1ff" },
                        { key: "activations", label: "激活", color: "#ffb454" },
                        {
                            key: "comm_buffer",
                            label: "通信缓冲",
                            color: "#7fd962",
                        },
                    ];
                    var hbm = data.hbm;

                    var W = container.clientWidth - 16;
                    var H = 320,
                        topM = 20,
                        botM = 80,
                        leftM = 68,
                        rightM = 24;
                    var plotW = W - leftM - rightM;
                    var plotH = H - topM - botM;
                    var N = categories.length;
                    var barGap = Math.max(14, plotW * 0.06);
                    var barW = Math.max(48, (plotW - barGap * (N + 1)) / N);

                    container.innerHTML = "";
                    var svg = d3
                        .select(container)
                        .append("svg")
                        .attr("width", W)
                        .attr("height", H);

                    // Y-axis: Memory Usage (GB)
                    var maxY = Math.ceil((hbm.total * 1.15) / 5) * 5; // round up to nearest 5 GB
                    var yScale = function (v) {
                        return plotH - (v / maxY) * plotH;
                    };

                    var g = svg
                        .append("g")
                        .attr(
                            "transform",
                            "translate(" + leftM + "," + topM + ")",
                        );

                    // ── Grid lines ──
                    var nGrids = 5;
                    for (var gi = 0; gi <= nGrids; gi++) {
                        var gv = (maxY * gi) / nGrids;
                        var gy = plotH - (gi / nGrids) * plotH;
                        g.append("line")
                            .attr("x1", 0)
                            .attr("x2", plotW)
                            .attr("y1", gy)
                            .attr("y2", gy)
                            .attr("stroke", "#1e2a36")
                            .attr("stroke-width", gi === 0 ? 1 : 0.5);
                        g.append("text")
                            .attr("x", -8)
                            .attr("y", gy + 4)
                            .attr("text-anchor", "end")
                            .attr("fill", "#4a5568")
                            .attr("font-size", "10px")
                            .attr("font-family", "JetBrains Mono,monospace")
                            .text(gv.toFixed(0) + " GB");
                    }

                    // ── Bars ──
                    var defs = svg.append("defs");
                    categories.forEach(function (cat) {
                        var gradId = "hbm-grad-" + cat.key;
                        var grad = defs
                            .append("linearGradient")
                            .attr("id", gradId)
                            .attr("x1", "0")
                            .attr("y1", "0")
                            .attr("x2", "0")
                            .attr("y2", "1");
                        grad.append("stop")
                            .attr("offset", "0%")
                            .attr("stop-color", cat.color)
                            .attr("stop-opacity", 0.95);
                        grad.append("stop")
                            .attr("offset", "100%")
                            .attr("stop-color", cat.color)
                            .attr("stop-opacity", 0.55);
                    });

                    var tooltip = d3
                        .select(container)
                        .append("div")
                        .attr("class", "result-tooltip");

                    categories.forEach(function (cat, i) {
                        var val = hbm[cat.key];
                        var barX = barGap + i * (barW + barGap);
                        var barH = Math.max(2, (val / maxY) * plotH);
                        var barY = plotH - barH;
                        var pct = ((val / hbm.total) * 100).toFixed(1);

                        // Bar with gradient
                        g.append("rect")
                            .attr("x", barX)
                            .attr("y", barY)
                            .attr("width", barW)
                            .attr("height", barH)
                            .attr("rx", 4)
                            .attr("ry", 4)
                            .attr("fill", "url(#hbm-grad-" + cat.key + ")");

                        // Value label on top
                        g.append("text")
                            .attr("x", barX + barW / 2)
                            .attr("y", barY - 6)
                            .attr("text-anchor", "middle")
                            .attr("fill", cat.color)
                            .attr("font-size", "12px")
                            .attr("font-weight", "600")
                            .attr("font-family", "JetBrains Mono,monospace")
                            .text(val.toFixed(1) + " GB");

                        // Percentage below value
                        g.append("text")
                            .attr("x", barX + barW / 2)
                            .attr("y", barY - 22)
                            .attr("text-anchor", "middle")
                            .attr("fill", "#7b8ca3")
                            .attr("font-size", "10px")
                            .attr("font-family", "JetBrains Mono,monospace")
                            .text(pct + "%");

                        // X-axis label
                        g.append("text")
                            .attr("x", barX + barW / 2)
                            .attr("y", plotH + 22)
                            .attr("text-anchor", "middle")
                            .attr("fill", "#7b8ca3")
                            .attr("font-size", "11px")
                            .attr("font-weight", "500")
                            .attr("font-family", "var(--font-sans)")
                            .text(cat.label);

                        // Hover overlay
                        g.append("rect")
                            .attr("x", barX - 2)
                            .attr("y", 0)
                            .attr("width", barW + 4)
                            .attr("height", plotH)
                            .attr("fill", "transparent")
                            .on("mouseover", function (ev) {
                                tooltip
                                    .classed("show", true)
                                    .html(
                                        '<div style="font-weight:600;margin-bottom:4px;color:' +
                                            cat.color +
                                            '">' +
                                            cat.label +
                                            "</div>" +
                                            "<div>Memory: <b>" +
                                            val.toFixed(2) +
                                            " GB</b></div>" +
                                            "<div>占比: <b>" +
                                            pct +
                                            "%</b></div>" +
                                            '<div style="color:var(--text-muted)">总显存: ' +
                                            hbm.total.toFixed(1) +
                                            " GB</div>",
                                    );
                            })
                            .on("mousemove", function (ev) {
                                tooltip
                                    .style("left", ev.clientX + 14 + "px")
                                    .style("top", ev.clientY - 60 + "px");
                            })
                            .on("mouseout", function () {
                                tooltip.classed("show", false);
                            });
                    });

                    // ── Y-axis label ──
                    svg.append("text")
                        .attr("x", 14)
                        .attr("y", topM + plotH / 2)
                        .attr("text-anchor", "middle")
                        .attr("fill", "#4a5568")
                        .attr("font-size", "10px")
                        .attr("font-family", "var(--font-sans)")
                        .attr(
                            "transform",
                            "rotate(-90,14," + (topM + plotH / 2) + ")",
                        )
                        .text("Memory Usage (GB)");

                    // ── Total line ──
                    svg.append("text")
                        .attr("x", leftM + plotW)
                        .attr("y", topM - 6)
                        .attr("text-anchor", "end")
                        .attr("fill", "var(--text-secondary)")
                        .attr("font-size", "10px")
                        .attr("font-family", "JetBrains Mono,monospace")
                        .text("Total: " + hbm.total.toFixed(1) + " GB / GPU");
                })();

                // ═══ Section 1: 负载序列记录 — stacked bar chart (compute vs comm per stage) ═══
                (function () {
                    var container = document.getElementById(
                        prefix + "-loadseq",
                    );
                    if (!container) return;
                    var W = container.clientWidth - 16;
                    var stages = data.loadSeq;
                    var N = stages.length;
                    var barW = Math.max(40, Math.min(70, (W - 80) / N - 6));
                    var chartW = Math.max(W, N * (barW + 6) + 100);
                    var H = 280,
                        topM = 16,
                        botM = 72,
                        leftM = 58,
                        rightM = 20;
                    var plotH = H - topM - botM;
                    var plotW = chartW - leftM - rightM;

                    // find max total time for scaling
                    var maxTotal = 0;
                    stages.forEach(function (s) {
                        var sum = s.compute_us + s.comm_us;
                        if (sum > maxTotal) maxTotal = sum;
                    });

                    container.innerHTML = "";
                    var svg = d3
                        .select(container)
                        .append("svg")
                        .attr("width", chartW)
                        .attr("height", H);

                    var g = svg
                        .append("g")
                        .attr(
                            "transform",
                            "translate(" + leftM + "," + topM + ")",
                        );

                    // grid lines
                    for (var i = 0; i <= 4; i++) {
                        g.append("line")
                            .attr("x1", 0)
                            .attr("x2", plotW)
                            .attr("y1", (plotH * i) / 4)
                            .attr("y2", (plotH * i) / 4)
                            .attr("stroke", "#1e2a36")
                            .attr("stroke-width", 0.5);
                    }

                    var tooltip = d3
                        .select(container)
                        .append("div")
                        .attr("class", "result-tooltip");

                    stages.forEach(function (s, idx) {
                        var x = idx * (barW + 6);
                        var hComp = Math.max(
                            1,
                            (s.compute_us / maxTotal) * plotH,
                        );
                        var hComm = Math.max(0, (s.comm_us / maxTotal) * plotH);

                        // compute bar (top)
                        g.append("rect")
                            .attr("x", x)
                            .attr("y", plotH - hComp - hComm)
                            .attr("width", barW)
                            .attr("height", hComp)
                            .attr("fill", "#39bae6")
                            .attr("rx", 2)
                            .attr("ry", 2)
                            .attr("opacity", 0.9);
                        // comm bar (bottom, stacked below compute)
                        if (hComm > 0.5) {
                            g.append("rect")
                                .attr("x", x)
                                .attr("y", plotH - hComm)
                                .attr("width", barW)
                                .attr("height", hComm)
                                .attr("fill", "#ff8f40")
                                .attr("rx", 2)
                                .attr("ry", 2)
                                .attr("opacity", 0.85);
                            // comm sub-segments (thin colored slices)
                            var commKeys = Object.keys(s.commBreakdown);
                            var yOff = plotH;
                            commKeys.forEach(function (ck) {
                                var segH = Math.max(
                                    1,
                                    (s.commBreakdown[ck] / maxTotal) * plotH,
                                );
                                g.append("rect")
                                    .attr("x", x + 2)
                                    .attr("y", yOff - segH)
                                    .attr("width", barW - 4)
                                    .attr("height", Math.max(0.6, segH))
                                    .attr("fill", TYPE_COLORS[ck] || "#7b8ca3")
                                    .attr("rx", 0.5)
                                    .attr("ry", 0.5)
                                    .attr("opacity", 0.7);
                                yOff -= segH;
                            });
                        }

                        // hover overlay
                        var totalUs = s.compute_us + s.comm_us;
                        g.append("rect")
                            .attr("x", x)
                            .attr("y", 0)
                            .attr("width", barW)
                            .attr("height", plotH)
                            .attr("fill", "transparent")
                            .on("mouseover", function (ev) {
                                var html =
                                    '<div style="font-weight:600;margin-bottom:4px;color:var(--cyan)">' +
                                    s.stage +
                                    "</div>";

                                    "<div>总耗时: <b>" +

                                    "</b></div>";
                                html +=
                                    '<div style="color:#39bae6">Compute: <b>' +
                                    formatUs(s.compute_us) +
                                    "</b> (" +
                                    (totalUs > 0
                                        ? (
                                              (s.compute_us / totalUs) *
                                              100
                                          ).toFixed(0)
                                        : 0) +
                                    "%)</div>";
                                html +=
                                    '<div style="color:#ff8f40">Comm: <b>' +
                                    formatUs(s.comm_us) +
                                    "</b> (" +
                                    (totalUs > 0
                                        ? ((s.comm_us / totalUs) * 100).toFixed(
                                              0,
                                          )
                                        : 0) +
                                    "%)</div>";
                                var commKeys = Object.keys(s.commBreakdown);
                                if (commKeys.length) {
                                    html +=
                                        '<div style="margin-top:3px;border-top:1px solid var(--border);padding-top:3px">';
                                    commKeys.forEach(function (ck) {
                                        html +=
                                            "<div>&nbsp;&nbsp;" +
                                            ck +
                                            ": <b>" +
                                            formatUs(s.commBreakdown[ck]) +
                                            "</b></div>";
                                    });
                                    html += "</div>";
                                }
                                tooltip.classed("show", true).html(html);
                            })
                            .on("mousemove", function (ev) {
                                tooltip
                                    .style("left", ev.clientX + 14 + "px")
                                    .style("top", ev.clientY - 70 + "px");
                            })
                            .on("mouseout", function () {
                                tooltip.classed("show", false);
                            });
                    });

                    // x-axis labels
                    stages.forEach(function (s, idx) {
                        var x = idx * (barW + 6) + barW / 2;
                        g.append("text")
                            .attr("x", x)
                            .attr("y", plotH + 14)
                            .attr("text-anchor", "start")

                                "transform",

                            .attr("fill", "#4a5568")
                            .attr("font-size", "9px")
                            .attr("font-family", "JetBrains Mono,monospace")
                            .text(formatUs(v));
                    }

                    // legend
                    var legY = H - 16;
                    [
                        { l: "Compute", c: "#39bae6" },
                        { l: "Comm Total", c: "#ff8f40" },
                        { l: "AllReduce", c: "#ff8f40" },
                        { l: "AllGather", c: "#baa1ff" },
                        { l: "RedScatter", c: "#ffb454" },
                        { l: "Broadcast", c: "#7fd962" },
                    ].forEach(function (d, i) {

                        svg.append("rect")
                            .attr("x", lx)
                            .attr("y", legY - 8)
                            .attr("width", 10)
                            .attr("height", 10)
                            .attr("fill", d.c)
                            .attr("rx", 2);
                        svg.append("text")
                            .attr("x", lx + 14)
                            .attr("y", legY)
                            .attr("fill", "#7b8ca3")
                            .attr("font-size", "9px")
                            .attr("font-family", "JetBrains Mono,monospace")
                            .text(d.l);
                    });
                })();

                // ═══ Section 2: 执行时间线 — Gantt chart by stage rows ═══
                (function () {
                    var container = document.getElementById(prefix + "-timeline");
                    if (!container) return;
                    var ops = data.ops;

                    // compute unique stages in order
                    var stages = [];

                            seen[o.stage] = true;

                    });

                    var rowH = 24,
                        topM = 10,

                        leftM = 124,

                    var W = container.clientWidth - 16;

                    var svg = d3

                            "transform",
                            "translate(" + leftM + "," + topM + ")",

                    stages.forEach(function (s, si) {

                            g.append("rect")

                                .attr("height", rowH)
