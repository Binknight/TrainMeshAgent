<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TrainMesh Agent</title>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg-deep: #0a0e14;
                --bg-panel: #11161d;
                --bg-surface: #161c24;
                --bg-hover: #1c2430;
                --bg-input: #0d1117;
                --border: #1e2a36;
                --border-active: #2d4a5e;
                --text-primary: #d4dce8;
                --text-secondary: #7b8ca3;
                --text-muted: #4a5568;
                --cyan: #39bae6;
                --cyan-dim: #1f5a7a;
                --teal: #3bceb4;
                --red: #f26d78;
                --yellow: #ffb454;
                --green: #7fd962;
                --purple: #baa1ff;
                --orange: #ff8f40;
                --font-mono: "JetBrains Mono", monospace;
                --font-sans: "DM Sans", system-ui, sans-serif;
                --radius: 8px;
                --radius-sm: 5px;
                --transition: 180ms ease;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: var(--bg-deep);
                color: var(--text-primary);
                font-family: var(--font-sans);
                font-size: 14px;
                line-height: 1.6;
                height: 100vh;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }

            /* ── Title Bar ── */
            .titlebar {
                height: 42px;
                background: var(--bg-panel);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                padding: 0 20px;
                gap: 10px;
                user-select: none;
                flex-shrink: 0;
            }
            .titlebar-logo {
                font-family: var(--font-mono);
                font-weight: 600;
                font-size: 13px;
                color: var(--cyan);
                letter-spacing: 0.5px;
            }
            .titlebar-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex-shrink: 0;
            }
            .titlebar-dot.cyan {
                background: var(--cyan);
            }
            .titlebar-dot.teal {
                background: var(--teal);
            }
            .titlebar-dot.amber {
                background: var(--yellow);
            }
            .titlebar-status {
                margin-left: auto;
                font-family: var(--font-mono);
                font-size: 11px;
                color: var(--text-muted);
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .status-indicator {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--green);
                animation: pulse-status 2s ease-in-out infinite;
            }
            @keyframes pulse-status {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.4;
                }
            }

            /* ── Main Layout ── */
            .main-container {
                display: flex;
                flex: 1;
                min-height: 0;
            }

            /* ── Left Panel: History ── */
            .panel-left {
                width: 300px;
                min-width: 260px;
                background: var(--bg-panel);
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                flex-shrink: 0;
            }
            .panel-header {
                padding: 14px 18px;
                border-bottom: 1px solid var(--border);
                font-family: var(--font-mono);
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 1.5px;
                color: var(--text-muted);
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .panel-header .count {
                margin-left: auto;
                background: var(--bg-surface);
                padding: 2px 8px;
                border-radius: 10px;
                font-size: 10px;
                color: var(--text-secondary);
            }
            .history-list {
                flex: 1;
                overflow-y: auto;
                padding: 8px;
            }
            .history-list::-webkit-scrollbar {
                width: 4px;
            }
            .history-list::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 2px;
            }
            .history-item {
                padding: 10px 12px;
                border-radius: var(--radius-sm);
                cursor: pointer;
                transition: background var(--transition);
                margin-bottom: 3px;
                border: 1px solid transparent;
                display: flex;
                align-items: flex-start;
                gap: 6px;
            }
            .history-item:hover {
                background: var(--bg-hover);
            }
            .history-item.active {
                background: var(--bg-surface);
                border-color: var(--border-active);
            }
            .history-item-main {
                flex: 1;
                min-width: 0;
                cursor: pointer;
            }
            .history-item-title {
                font-size: 13px;
                font-weight: 500;
                color: var(--text-primary);
                margin-bottom: 3px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .history-delete {
                flex-shrink: 0;
                width: 20px;
                height: 20px;
                border: none;
                background: transparent;
                color: var(--text-muted);
                font-size: 15px;
                line-height: 1;
                cursor: pointer;
                border-radius: 3px;
                padding: 0;
                opacity: 0;
                transition:
                    opacity var(--transition),
                    color var(--transition);
            }
            .history-item:hover .history-delete {
                opacity: 1;
            }
            .history-delete:hover {
                color: var(--red);
                background: rgba(242, 109, 120, 0.1);
            }
            .history-empty {
                padding: 32px 16px;
                text-align: center;
                color: var(--text-muted);
                font-size: 13px;
            }
            .history-item-meta {
                font-family: var(--font-mono);
                font-size: 10px;
                color: var(--text-muted);
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .history-badge {
                font-family: var(--font-mono);
                font-size: 9px;
                padding: 2px 7px;
                border-radius: 10px;
                font-weight: 500;
            }
            .badge-running {
                background: rgba(57, 186, 230, 0.15);
                color: var(--cyan);
            }
            .badge-done {
                background: rgba(127, 217, 98, 0.12);
                color: var(--green);
            }
            .badge-failed {
                background: rgba(242, 109, 120, 0.12);
                color: var(--red);
            }
            .badge-draft {
                background: rgba(122, 140, 163, 0.12);
                color: var(--text-secondary);
            }
            .panel-footer {
                padding: 12px 18px;
                border-top: 1px solid var(--border);
                display: flex;
                gap: 8px;
            }
            .btn-new {
                flex: 1;
                padding: 8px 0;
                background: transparent;
                border: 1px solid var(--border-active);
                color: var(--cyan);
                font-family: var(--font-mono);
                font-size: 11px;
                cursor: pointer;
                border-radius: var(--radius-sm);
                transition: all var(--transition);
                font-weight: 500;
            }
            .btn-new:hover {
                background: rgba(57, 186, 230, 0.08);
            }

            /* ── Center: Canvas ── */
            .panel-center {
                flex: 1;
                background: var(--bg-deep);
                display: flex;
                flex-direction: column;
                min-width: 0;
            }
            .canvas-toolbar {
                height: 36px;
                background: var(--bg-panel);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                padding: 0 14px;
                gap: 10px;
                flex-shrink: 0;
                user-select: none;
            }
            .canvas-label {
                font-family: var(--font-mono);
                font-size: 10px;
                color: var(--text-secondary);
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .canvas-toolbar-right {
                margin-left: auto;
                display: flex;
                gap: 8px;
                align-items: center;
            }
            .btn-sim {
                padding: 5px 16px;
                border-radius: var(--radius-sm);
                border: 1px solid var(--border);
                background: var(--bg-surface);
                color: var(--text-muted);
                font-family: var(--font-mono);
                font-size: 11px;
                font-weight: 600;
                cursor: not-allowed;
                transition: all var(--transition);
                white-space: nowrap;
                user-select: none;
                letter-spacing: 0.5px;
            }
            .btn-sim:disabled {
                opacity: 0.4;
            }
            .btn-sim.sim-done {
                cursor: default;
                opacity: 0.65;
                border-color: var(--teal);
                color: var(--teal);
                background: linear-gradient(
                    135deg,
                    rgba(59, 206, 180, 0.15),
                    rgba(59, 206, 180, 0.05)
                );
            }
            .btn-sim:not(:disabled) {
                cursor: pointer;
                color: #fff;
                border-color: var(--cyan);
                background: linear-gradient(
                    135deg,
                    rgba(57, 186, 230, 0.25),
                    rgba(59, 206, 180, 0.15)
                );
                box-shadow: 0 0 12px rgba(57, 186, 230, 0.12);
            }
            .btn-sim:not(:disabled):hover {
                background: linear-gradient(
                    135deg,
                    rgba(57, 186, 230, 0.4),
                    rgba(59, 206, 180, 0.25)
                );
                box-shadow: 0 0 18px rgba(57, 186, 230, 0.25);
            }
            .toggle-btn {
                font-family: var(--font-mono);
                font-size: 9px;
                padding: 3px 10px;
                border-radius: 10px;
                border: 1px solid var(--border);
                background: transparent;
                color: var(--text-muted);
                cursor: pointer;
                transition: all var(--transition);
                font-weight: 500;
            }
            .toggle-btn:hover {
                border-color: var(--text-muted);
                color: var(--text-secondary);
            }
            .toggle-btn.active {
                border-color: var(--cyan-dim);
                color: var(--cyan);
                background: rgba(57, 186, 230, 0.1);
            }

            /* ── Canvas Tabs ── */
            .canvas-tabs {
                display: flex;
                gap: 0;
                flex-shrink: 0;
                padding: 0 14px;
                background: var(--bg-panel);
                border-bottom: 1px solid var(--border);
            }
            .canvas-tab {
                padding: 7px 20px;
                font-size: 12px;
                color: var(--text-muted);
                cursor: pointer;
                border-bottom: 2px solid transparent;
                transition: all var(--transition);
                background: none;
                border-top: none;
                border-left: none;
                border-right: none;
                font-family: var(--font-sans);
                font-weight: 500;
                user-select: none;
            }
            .canvas-tab:hover {
                color: var(--text-primary);
            }
            .canvas-tab.active {
                color: var(--cyan);
                border-bottom-color: var(--cyan);
            }
            .canvas-tab:disabled {
                color: var(--text-muted);
                opacity: 0.35;
                cursor: not-allowed;
                pointer-events: none;
            }

            /* ── Canvas Tab Panels ── */
            .canvas-tab-panel {
                display: none;
                flex: 1;
                min-height: 0;
            }
            .canvas-tab-panel.active {
                display: flex;
                flex-direction: column;
            }
            .canvas-tab-panel .canvas-svg-wrap {
                flex: 1;
            }
            .canvas-results-placeholder {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text-muted);
                font-family: var(--font-mono);
                font-size: 13px;
                letter-spacing: 1px;
            }

            /* ── Simulation Tab ── */
            .sim-panel-wrap {
                flex: 1;
                display: flex;
                flex-direction: column;
                min-height: 0;
            }
            .sim-topo-area {
                flex: 0 0 45%;
                min-height: 150px;
                max-height: 85%;
                position: relative;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .sim-topo-area .canvas-section {
                width: 100%;
                height: 100%;
            }
            .sim-resize-handle {
                flex: 0 0 6px;
                background: var(--border);
                cursor: row-resize;
                transition: background 0.15s;
                position: relative;
                z-index: 10;
            }
            .sim-resize-handle:hover,
            .sim-resize-handle.active {
                background: var(--cyan);
            }
            .sim-resize-handle::after {
                content: "";
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                width: 30px;
                height: 2px;
                background: var(--text-muted);
                border-radius: 1px;
            }
            .sim-topo-placeholder {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 8px;
                color: var(--text-muted);
                font-family: var(--font-sans);
                font-size: 13px;
            }
            .sim-topo-placeholder span {
                font-size: 11px;
                color: var(--text-muted);
                opacity: 0.5;
            }
            .sim-results-area {
                flex: 1;
                overflow-y: auto;
                padding: 16px 20px;
            }

            /* ── Results Tab ── */
            .results-wrap {
                flex: 1;
                overflow-y: auto;
                padding: 16px 20px;
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
            .results-wrap::-webkit-scrollbar {
                width: 4px;
            }
            .results-wrap::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 2px;
            }
            .rank-switcher-bar {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 8px 14px;
                background: var(--bg-panel);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                flex-shrink: 0;
            }
            .rank-sw-label-text {
                font-family: var(--font-mono);
                font-size: 11px;
                color: var(--text-muted);
            }
            .rank-sw-value {
                font-family: var(--font-mono);
                font-size: 13px;
                font-weight: 600;
                color: var(--teal);
            }
            .rank-sw-spacer {
                flex: 1;
            }
            .rank-sw-label {
                font-family: var(--font-mono);
                font-size: 10px;
                color: var(--text-muted);
                margin-left: 4px;
            }
            .rank-sw-select {
                background: var(--bg-surface);
                color: var(--text-primary);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                font-family: var(--font-mono);
                font-size: 11px;
                padding: 2px 6px;
                cursor: pointer;
                outline: none;
            }
            .rank-sw-select:focus {
                border-color: var(--cyan);
            }

            .result-section {
                background: var(--bg-surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                overflow: visible;
            }
            .result-section-header {
                border-radius: var(--radius) var(--radius) 0 0;
            }
            .result-section-header {
                padding: 10px 16px;
                background: var(--bg-panel);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: baseline;
                gap: 12px;
            }
            .result-section-title {
                font-family: var(--font-mono);
                font-size: 12px;
                font-weight: 600;
                color: var(--text-primary);
                white-space: nowrap;
            }
            .result-section-sub {
                font-family: var(--font-mono);
                font-size: 10px;
                color: var(--text-muted);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .result-chart {
                padding: 12px 8px 8px;
                overflow-x: auto;
                position: relative;
            }
            .result-chart svg {
                display: block;
            }
            .result-chart::-webkit-scrollbar {
                width: 4px;
                height: 4px;
            }
            .result-chart::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 2px;
            }

            /* operator spec table */
            .result-table-wrap {
                padding: 0;
                overflow-x: auto;
                max-height: 420px;
                overflow-y: auto;
            }
            .result-table-wrap::-webkit-scrollbar {
                width: 4px;
                height: 4px;
            }
            .result-table-wrap::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 2px;
            }
            .result-op-table {
                width: 100%;
                border-collapse: collapse;
                font-family: var(--font-mono);
                font-size: 10px;
            }
            .result-op-table thead {
                position: sticky;
                top: 0;
                z-index: 2;
            }
            .result-op-table th {
                background: #1a1f29;
                color: var(--text-muted);
                font-weight: 600;
                padding: 7px 10px;
                text-align: left;
                white-space: nowrap;
                border-bottom: 2px solid var(--border);
                font-size: 9px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            .result-op-table td {
                padding: 6px 10px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.04);
                color: var(--text-secondary);
                white-space: nowrap;
                max-width: 180px;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .result-op-table tbody tr:hover td {
                background: rgba(57, 186, 230, 0.04);
                color: var(--text-primary);
            }
            .result-op-table .cell-shape {
                color: var(--teal);
            }
            .result-op-table .cell-flops {
                color: var(--cyan);
                text-align: right;
            }
            .result-op-table .cell-hbm {
                color: var(--purple);
                text-align: right;
            }
            .result-op-table .cell-comm {
                color: var(--orange);
                text-align: right;
            }
            .result-op-table .cell-stage {
                text-align: center;
            }
            .result-op-table .cell-phase {
                text-align: center;
            }
            .phase-badge {
                display: inline-block;
                padding: 2px 8px;
                border-radius: 10px;
                font-size: 9px;
                font-weight: 600;
                letter-spacing: 0.5px;
            }
            .phase-badge.fwd {
                background: rgba(57, 186, 230, 0.18);
                color: var(--cyan);
            }
            .phase-badge.bwd {
                background: rgba(59, 206, 180, 0.18);
                color: var(--teal);
            }
            .phase-badge.opt {
                background: rgba(255, 180, 84, 0.18);
                color: var(--yellow);
            }
            .phase-badge.comm {
                background: rgba(255, 143, 64, 0.18);
                color: var(--orange);
            }

            /* load-sequence chart tooltips */
            .result-tooltip {
                position: fixed;
                pointer-events: none;
                z-index: 5000;
                background: var(--bg-panel);
                border: 1px solid var(--border-active);
                border-radius: 6px;
                padding: 8px 12px;
                font-family: var(--font-mono);
                font-size: 10px;
                color: var(--text-primary);
                opacity: 0;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
                white-space: nowrap;
                transition: opacity 0.12s;
                max-width: 380px;
            }
            .result-tooltip.show {
                opacity: 1;
            }
            .canvas-svg-wrap {
                flex: 1;
                position: relative;
                overflow: auto;
            }
            .canvas-svg-wrap::-webkit-scrollbar {
                width: 4px;
                height: 4px;
            }
            .canvas-svg-wrap::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 2px;
            }
            .canvas-section {
                width: 100%;
                position: relative;
            }
            .canvas-section svg {
                width: 100%;
                display: block;
            }
            .canvas-placeholder {
                text-align: center;
                color: var(--text-muted);
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
            .canvas-placeholder svg {
                display: block;
                margin: 0 auto 16px;
                opacity: 0.25;
            }
            .canvas-placeholder p {
                font-family: var(--font-mono);
                font-size: 13px;
                letter-spacing: 1px;
            }
            .canvas-placeholder span {
                font-size: 11px;
                display: block;
                margin-top: 4px;
                opacity: 0.5;
            }
            .canvas-placeholder.hidden {
                display: none;
            }

            /* ── Right Panel: Workflow + Chat ── */
            .panel-right {
                width: 440px;
                min-width: 380px;
                background: var(--bg-panel);
                border-left: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                flex-shrink: 0;
            }
            .session-id {
                font-family: var(--font-mono);
                font-size: 10px;
                color: var(--cyan-dim);
                max-width: 100px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            /* ── Workflow Panel ── */
            .workflow-panel {
                height: 520px;
                min-height: 200px;
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                position: relative;
            }
            .wf-resize-handle {
                height: 6px;
                background: var(--border);
                cursor: ns-resize;
                flex-shrink: 0;
                transition: background 0.15s;
            }
            .wf-resize-handle:hover,
            .wf-resize-handle.active {
                background: var(--cyan);
            }
            .workflow-panel .panel-header {
                justify-content: space-between;
                gap: 8px;
            }
            /* ── AI Mode Toggle ── */
            .ai-toggle {
                display: flex;
                align-items: center;
                gap: 6px;
                cursor: pointer;
                user-select: none;
                flex-shrink: 0;
            }
            .ai-toggle input[type="checkbox"] {
                display: none;
            }
            .ai-toggle-label {
                font-family: var(--font-mono);
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 1px;
                color: var(--text-muted);
                transition: color 0.2s;
            }
            .ai-toggle input:checked ~ .ai-toggle-label {
                color: var(--cyan);
                text-shadow: 0 0 8px rgba(57, 186, 230, 0.5);
            }
            .ai-toggle-slider {
                position: relative;
                width: 32px;
                height: 18px;
                background: var(--border);
                border-radius: 9px;
                transition: background 0.25s;
            }
            .ai-toggle-slider::after {
                content: "";
                position: absolute;
                top: 2px;
                left: 2px;
                width: 14px;
                height: 14px;
                background: var(--text-muted);
                border-radius: 50%;
                transition: all 0.25s;
            }
            .ai-toggle input:checked ~ .ai-toggle-slider {
                background: rgba(57, 186, 230, 0.35);
            }
            .ai-toggle input:checked ~ .ai-toggle-slider::after {
                left: 16px;
                background: var(--cyan);
                box-shadow: 0 0 6px rgba(57, 186, 230, 0.6);
            }
            .workflow-svg-wrap {
                flex: 1;
                overflow-y: auto;
                padding: 4px 8px;
                position: relative;
            }
            .workflow-svg-wrap::-webkit-scrollbar {
                width: 3px;
            }
            .workflow-svg-wrap::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 2px;
            }

            /* ── Chat Panel (wraps existing chat area) ── */
            .chat-panel {
                flex: 1;
                display: flex;
                flex-direction: column;
                min-height: 0;
                overflow: hidden;
            }
            .chat-panel .panel-header {
                justify-content: space-between;
            }

            /* ── Workflow Node SVG styles ── */
            .wf-node-rect {
                transition: all 0.25s ease;
                cursor: pointer;
            }
            .wf-node-rect.pending {
                fill: var(--bg-surface);
                stroke: #8a94a1;
                stroke-dasharray: 4 3;
            }
            .wf-node-rect.active {
                fill: rgba(57, 186, 230, 0.08);
                stroke: var(--cyan);
                stroke-width: 1.8;
                animation: wf-pulse 2s ease-in-out infinite;
            }
            .wf-node-rect.completed {
                fill: rgba(127, 217, 98, 0.06);
                stroke: var(--green);
            }
            .wf-node-rect.failed {
                fill: rgba(242, 109, 120, 0.06);
                stroke: var(--red);
            }
            .wf-node-rect.waiting_input {
                fill: rgba(255, 180, 84, 0.08);
                stroke: var(--yellow);
                animation: wf-pulse-yellow 1.5s ease-in-out infinite;
            }
            .wf-node-rect.disabled {
                fill: var(--bg-surface);
                stroke: var(--border);
                opacity: 0.45;
                cursor: not-allowed;
            }
            @keyframes wf-pulse {
                0%,
                100% {
                    stroke-opacity: 1;
                }
                50% {
                    stroke-opacity: 0.4;
                }
            }
            @keyframes wf-pulse-yellow {
                0%,
                100% {
                    stroke-opacity: 1;
                }
                50% {
                    stroke-opacity: 0.35;
                }
            }

            /* Workflow confirm button on active node */
            .wf-confirm-btn {
                font-family: var(--font-mono);
                font-size: 9px;
                padding: 2px 8px;
                border-radius: 4px;
                border: 1px solid var(--cyan);
                background: rgba(57, 186, 230, 0.15);
                color: var(--cyan);
                cursor: pointer;
                transition: all 0.18s;
                white-space: nowrap;
            }
            .wf-confirm-btn:hover {
                background: rgba(57, 186, 230, 0.3);
                color: #fff;
            }

            /* ── Parameter Input Overlay ── */
            .workflow-param-overlay {
                position: absolute;
                top: 36px;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(10, 14, 20, 0.85);
                z-index: 50;
                display: flex;
                align-items: flex-start;
                justify-content: center;
                padding-top: 40px;
            }
            .wf-param-columns {
                display: grid;
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .wf-param-col {
                min-width: 0;
            }
            .workflow-param-card {
                width: 340px;
                max-height: 90vh;
                overflow-y: auto;
                background: var(--bg-panel);
                border: 1px solid var(--border-active);
                border-radius: var(--radius);
                padding: 16px 20px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            }
            .workflow-param-title {
                font-family: var(--font-mono);
                font-size: 13px;
                font-weight: 600;
                color: var(--cyan);
                margin-bottom: 14px;
                text-align: center;
            }
            .workflow-param-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 10px;
                gap: 12px;
            }
            .workflow-param-section {
                font-family: var(--font-mono);
                font-size: 11px;
                font-weight: 600;
                color: var(--cyan);
                margin-top: 14px;
                margin-bottom: 8px;
                padding-bottom: 6px;
                border-bottom: 1px solid var(--border);
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            .workflow-param-section:first-of-type {
                margin-top: 0;
            }
            .workflow-param-row label {
                font-family: var(--font-mono);
                font-size: 11px;
                color: var(--text-secondary);
                min-width: 28px;
                flex-shrink: 0;
            }
            #wf-orig-model-name {
                flex: 0 0 auto;
                width: 200px;
            }
            .workflow-param-row select,
            .workflow-param-row input {
                flex: 1;
                min-width: 0;
                background: var(--bg-input);
                border: 1px solid var(--border);
                border-radius: 4px;
                color: var(--text-primary);
                font-family: var(--font-mono);
                font-size: 11px;
                padding: 5px 6px;
                outline: none;
                transition: border-color 0.18s;
            }
            .workflow-param-row select:disabled,
            .workflow-param-row input:disabled {
                background: #161b22;
                color: #6e7681;
                border-color: #21262d;
                cursor: not-allowed;
            }
            .workflow-param-row select:focus,
            .workflow-param-row input:focus,
            .workflow-param-row textarea:focus {
                border-color: var(--border-active);
            }
            .workflow-param-row input[type="checkbox"] {
                flex: 0;
                width: 18px;
                height: 18px;
                min-width: 18px;
                padding: 0;
                cursor: pointer;
                appearance: none;
                -webkit-appearance: none;
                -moz-appearance: none;
                border: 2px solid var(--border-active);
                border-radius: 3px;
                background: var(--bg-input);
                position: relative;
                outline: none;
                transition:
                    background 0.15s,
                    border-color 0.15s;
            }
            .workflow-param-row input[type="checkbox"]:checked {
                background: var(--cyan);
                border-color: var(--cyan);
            }
            .workflow-param-row input[type="checkbox"]:checked::after {
                content: "";
                position: absolute;
                left: 5px;
                top: 1px;
                width: 5px;
                height: 10px;
                border: solid #0a0e14;
                border-width: 0 2px 2px 0;
                transform: rotate(45deg);
            }
            .workflow-param-row:has(input[type="checkbox"]) {
                justify-content: flex-start;
                align-items: center;
            }
            .workflow-param-row:has(input[type="checkbox"]) label {
                line-height: 18px;
                width: 160px;
                flex-shrink: 0;
            }
            .workflow-param-row input[type="checkbox"]:hover {
                border-color: #fff;
            }
            .workflow-param-row textarea {
                flex: 1;
                min-width: 0;
                background: var(--bg-input);
                border: 1px solid var(--border);
                border-radius: 4px;
                color: var(--text-primary);
                font-family: var(--font-mono);
                font-size: 11px;
                padding: 5px 6px;
                outline: none;
                resize: vertical;
            }
            .sim-param-card {
                width: 400px;
                max-width: calc(100% - 20px);
            }
            .workflow-param-actions {
                display: flex;
                gap: 8px;
                margin-top: 16px;
                justify-content: flex-end;
            }
            .btn-wf-cancel {
                padding: 6px 14px;
                background: transparent;
                border: 1px solid var(--border);
                border-radius: 4px;
                color: var(--text-muted);
                font-family: var(--font-mono);
                font-size: 11px;
                cursor: pointer;
                transition: all 0.18s;
            }
            .btn-wf-cancel:hover {
                border-color: var(--text-muted);
                color: var(--text-secondary);
            }
            .btn-wf-submit {
                padding: 6px 18px;
                background: linear-gradient(
                    135deg,
                    rgba(57, 186, 230, 0.25),
                    rgba(59, 206, 180, 0.15)
                );
                border: 1px solid var(--cyan);
                border-radius: 4px;
                color: #fff;
                font-family: var(--font-mono);
                font-size: 11px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.18s;
            }
            .btn-wf-submit:hover {
                background: linear-gradient(
                    135deg,
                    rgba(57, 186, 230, 0.4),
                    rgba(59, 206, 180, 0.25)
                );
                box-shadow: 0 0 12px rgba(57, 186, 230, 0.2);
            }
            .chat-messages {
                flex: 1;
                overflow-y: auto;
                padding: 16px;
                display: flex;
                flex-direction: column;
                gap: 14px;
            }
            .chat-messages::-webkit-scrollbar {
                width: 4px;
            }
            .chat-messages::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 2px;
            }

            .msg-group {
                display: flex;
                flex-direction: column;
                gap: 4px;
                max-width: 78%;
            }
            .msg-group.left {
                align-self: flex-start;
                align-items: flex-start;
            }
            .msg-group.right {
                align-self: flex-end;
                align-items: flex-end;
            }
            .msg-label {
                font-family: var(--font-mono);
                font-size: 9px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 1px;
                padding: 0 4px;
            }
            .msg-label.user {
                color: var(--cyan);
            }
            .msg-label.agent {
                color: var(--teal);
            }
            .msg-label.system {
                color: var(--yellow);
            }
            .msg-label.error {
                color: var(--red);
            }

            .msg-bubble {
                padding: 10px 14px;
                border-radius: var(--radius);
                font-size: 13px;
                line-height: 1.55;
                position: relative;
                white-space: pre-wrap;
                word-break: break-word;
                max-width: 100%;
            }
            .msg-bubble code {
                font-family: var(--font-mono);
                font-size: 11px;
                background: rgba(0, 0, 0, 0.3);
                padding: 2px 6px;
                border-radius: 3px;
            }
            .msg-bubble .json-block {
                display: block;
                margin: 8px 0;
                padding: 10px 12px;
                background: rgba(0, 0, 0, 0.35);
                border-radius: var(--radius-sm);
                font-family: var(--font-mono);
                font-size: 11px;
                line-height: 1.5;
                overflow-x: auto;
                color: var(--teal);
                border: 1px solid rgba(58, 206, 180, 0.15);
            }

            /* markdown rendered styles */
            .msg-bubble h1,
            .msg-bubble h2,
            .msg-bubble h3 {
                font-size: 15px;
                margin: 10px 0 6px;
                color: var(--text-primary);
            }
            .msg-bubble h2 {
                font-size: 14px;
                border-bottom: 1px solid var(--border);
                padding-bottom: 4px;
            }
            .msg-bubble h3 {
                font-size: 13px;
            }
            .msg-bubble ul,
            .msg-bubble ol {
                padding-left: 20px;
                margin: 4px 0;
            }
            .msg-bubble li {
                margin: 2px 0;
            }
            .msg-bubble p {
                margin: 4px 0;
            }
            .msg-bubble table {
                border-collapse: collapse;
                margin: 8px 0;
                font-size: 12px;
                width: 100%;
            }
            .msg-bubble th,
            .msg-bubble td {
                border: 1px solid var(--border);
                padding: 6px 10px;
                text-align: left;
            }
            .msg-bubble th {
                background: rgba(0, 0, 0, 0.25);
                font-weight: 600;
                color: var(--cyan);
            }
            .msg-bubble td {
                background: rgba(0, 0, 0, 0.1);
            }
            .msg-bubble pre {
                margin: 8px 0;
                padding: 10px 12px;
                background: rgba(0, 0, 0, 0.35);
                border-radius: var(--radius-sm);
                font-family: var(--font-mono);
                font-size: 11px;
                line-height: 1.5;
                overflow-x: auto;
                border: 1px solid var(--border);
            }
            .msg-bubble pre code {
                background: none;
                padding: 0;
                font-size: 11px;
            }
            .msg-bubble blockquote {
                border-left: 3px solid var(--cyan-dim);
                margin: 6px 0;
                padding: 4px 10px;
                color: var(--text-secondary);
                font-style: italic;
            }
            .msg-bubble hr {
                border: none;
                border-top: 1px solid var(--border);
                margin: 10px 0;
            }
            .msg-bubble strong {
                color: var(--text-primary);
                font-weight: 600;
            }
            .msg-bubble a {
                color: var(--cyan);
            }
            .msg-bubble.user {
                background: rgba(57, 186, 230, 0.13);
                border: 1px solid rgba(57, 186, 230, 0.25);
                border-radius: var(--radius) 4px 4px var(--radius);
                color: #d0eaf5;
            }
            .msg-bubble.agent {
                background: var(--bg-surface);
                border: 1px solid var(--border);
                border-radius: 4px var(--radius) var(--radius) 4px;
            }
            .msg-bubble.system {
                background: rgba(255, 180, 84, 0.06);
                border: 1px solid rgba(255, 180, 84, 0.12);
                font-size: 11px;
                border-radius: var(--radius);
                color: var(--text-secondary);
            }
            .msg-bubble.error {
                background: rgba(242, 109, 120, 0.08);
                border: 1px solid rgba(242, 109, 120, 0.2);
                color: var(--red);
                border-radius: var(--radius);
                font-size: 12px;
            }
            .msg-bubble.tool {
                background: rgba(58, 206, 180, 0.05);
                border: 1px solid rgba(58, 206, 180, 0.18);
                font-family: var(--font-mono);
                font-size: 11px;
            }
            .msg-bubble.mesh {
                background: rgba(186, 161, 255, 0.05);
                border: 1px solid rgba(186, 161, 255, 0.18);
                font-family: var(--font-mono);
                font-size: 11px;
                white-space: pre-wrap;
                max-height: 280px;
                overflow-y: auto;
            }
            .msg-bubble.model {
                background: rgba(63, 188, 239, 0.05);
                border: 1px solid rgba(63, 188, 239, 0.18);
                font-family: var(--font-mono);
                font-size: 11px;
                border-left: 3px solid var(--cyan);
            }

            /* thinking animation */
            .thinking-dots {
                display: inline-flex;
                gap: 3px;
                padding: 2px 0;
            }
            .thinking-dots span {
                width: 5px;
                height: 5px;
                background: var(--text-muted);
                border-radius: 50%;
                animation: dot-bounce 1.2s infinite ease-in-out;
            }
            .thinking-dots span:nth-child(2) {
                animation-delay: 0.2s;
            }
            .thinking-dots span:nth-child(3) {
                animation-delay: 0.4s;
            }
            @keyframes dot-bounce {
                0%,
                80%,
                100% {
                    opacity: 0.2;
                    transform: translateY(0);
                }
                40% {
                    opacity: 1;
                    transform: translateY(-4px);
                }
            }

            /* ── Input Area ── */
            .chat-input-area {
                padding: 12px 16px;
                border-top: 1px solid var(--border);
                display: flex;
                gap: 8px;
            }
            .chat-input {
                flex: 1;
                background: var(--bg-input);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 10px 14px;
                color: var(--text-primary);
                font-family: var(--font-mono);
                font-size: 13px;
                resize: none;
                outline: none;
                transition: border-color var(--transition);
                min-height: 40px;
                max-height: 120px;
                line-height: 1.5;
            }
            .chat-input:focus {
                border-color: var(--border-active);
            }
            .chat-input::placeholder {
                color: var(--text-muted);
            }
            .btn-send {
                width: 40px;
                height: 40px;
                background: var(--cyan-dim);
                border: none;
                border-radius: var(--radius);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all var(--transition);
                color: var(--bg-deep);
                flex-shrink: 0;
            }
            .btn-send:hover {
                background: var(--cyan);
            }
            .btn-send:disabled {
                opacity: 0.3;
                cursor: not-allowed;
            }

            /* ── Quick actions ── */
            .quick-actions {
                padding: 8px 16px 0;
                display: flex;
                gap: 6px;
                flex-wrap: wrap;
            }
            .quick-chip {
                font-family: var(--font-mono);
                font-size: 10px;
                padding: 4px 10px;
                border-radius: 12px;
                border: 1px solid var(--border);
                background: var(--bg-surface);
                color: var(--text-secondary);
                cursor: pointer;
                transition: all var(--transition);
                white-space: nowrap;
            }
            .quick-chip:hover {
                border-color: var(--border-active);
                color: var(--cyan);
                background: var(--bg-hover);
            }

            /* ── Utility ── */
            .hidden {
                display: none !important;
            }
            @keyframes fade-in {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .fade-in {
                animation: fade-in 0.25s ease;
            }

            /* ── D3 Mesh Visualization ── */
            .tp-rect.has-data {
                stroke: #39bae6;
            }
            .tp-rect.has-data:hover {
                stroke: #39bae6;
                stroke-width: 2;
                fill: #162430;
            }
            /* ── Rank Tooltip ── */
            #rank-tooltip,
            #rank-tooltip-mapped {
                position: fixed;
                pointer-events: none;
                z-index: 2000;
                background: var(--bg-panel);
                border: 1px solid var(--border-active);
                border-radius: 10px;
                padding: 0;
                min-width: 200px;
                max-width: 380px;
                font-family: var(--font-mono);
                font-size: 11px;
                box-shadow: 0 6px 28px rgba(0, 0, 0, 0.55);
                opacity: 0;
                transition: opacity 0.15s;
                line-height: 1.4;
            }
            #rank-tooltip.visible,
            #rank-tooltip-mapped.visible {
                opacity: 1;
            }
            #rank-tooltip.pinned,
            #rank-tooltip-mapped.pinned {
                pointer-events: auto;
            }

            /* ── Model Concept Tooltip ── */
            #model-tooltip {
                position: fixed;
                pointer-events: none;
                z-index: 2000;
                background: var(--bg-panel);
                border: 1px solid var(--border-active);
                border-radius: 10px;
                padding: 14px 16px;
                min-width: 240px;
                max-width: 360px;
                font-family: var(--font-sans);
                font-size: 12px;
                box-shadow: 0 6px 28px rgba(0, 0, 0, 0.55);
                opacity: 0;
                transition: opacity 0.15s;
                line-height: 1.55;
                color: var(--text-primary);
            }
            #model-tooltip.visible {
                opacity: 1;
            }
            #model-tooltip .tip-title {
                font-size: 14px;
                font-weight: 600;
                color: var(--cyan);
                margin-bottom: 6px;
            }
            #model-tooltip .tip-eng {
                font-size: 11px;
                font-weight: 400;
                color: var(--text-secondary);
                margin-bottom: 10px;
                font-family: var(--font-mono);
            }
            #model-tooltip .tip-explain {
                font-size: 11px;
                color: var(--text-primary);
                margin-bottom: 8px;
                line-height: 1.6;
            }
            #model-tooltip .tip-math {
                font-size: 10px;
                font-family: var(--font-mono);
                color: var(--teal);
                background: var(--bg-surface);
                border-radius: 5px;
                padding: 6px 10px;
                margin-bottom: 8px;
                word-break: break-all;
            }
            #model-tooltip .tip-values {
                font-size: 10px;
                color: var(--text-secondary);
                line-height: 1.5;
            }

            /* ── Tooltip Detail Panel (right-side expansion) ── */
            #rank-tooltip-detail,
            #rank-tooltip-detail-mapped {
                position: fixed;
                z-index: 2001;
                pointer-events: auto;
                background: var(--bg-panel);
                border: 1px solid var(--border-active);
                border-left: 3px solid var(--cyan);
                border-radius: 10px;
                padding: 0;
                width: 300px;
                max-width: 340px;
                max-height: 420px;
                overflow-y: auto;
                font-family: var(--font-mono);
                font-size: 11px;
                box-shadow: 0 6px 28px rgba(0, 0, 0, 0.55);
                opacity: 0;
                transition: opacity 0.15s;
                line-height: 1.4;
                display: none;
            }
            #rank-tooltip-detail.visible,
            #rank-tooltip-detail-mapped.visible {
                display: block;
                opacity: 1;
            }
            .tooltip-detail-header {
                display: flex;
                align-items: center;
                padding: 8px 12px;
                background: var(--bg-surface);
                border-bottom: 1px solid var(--border);
                border-radius: 0 10px 0 0;
                flex-shrink: 0;
            }
            .tooltip-detail-title {
                font-weight: 600;
                font-size: 11px;
                color: var(--text-primary);
            }
            .tooltip-detail-close {
                margin-left: auto;
                background: none;
                border: none;
                color: var(--text-muted);
                font-size: 16px;
                cursor: pointer;
                padding: 2px 6px;
                border-radius: 4px;
                transition: all var(--transition);
                line-height: 1;
            }
            .tooltip-detail-close:hover {
                color: var(--red);
                background: rgba(242, 109, 120, 0.1);
            }
            .tooltip-detail-body {
                padding: 8px 12px 10px;
            }
            .tooltip-detail-table {
                width: 100%;
                border-collapse: collapse;
            }
            .tooltip-detail-table th {
                text-align: center;
                font-size: 10px;
                color: var(--text-muted);
                padding: 5px 8px;
                border-bottom: 1px solid var(--border);
                font-weight: 500;
            }
            .tooltip-detail-table td {
                text-align: center;
                padding: 5px 8px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.03);
                font-size: 11px;
                color: var(--text-primary);
            }
            .tooltip-detail-table td.tooltip-detail-label {
                text-align: left;
                color: var(--text-secondary);

    <body>
        <!-- Title Bar -->
        <div class="titlebar">
            <span class="titlebar-dot cyan"></span>
            <span class="titlebar-dot teal"></span>

                <span class="status-indicator"></span>
                <span id="status-text">idle</span>
            </span>
        </div>

        <!-- Main 3-panel -->
        <div class="main-container">
            <!-- LEFT: History -->
            <aside class="panel-left">
                <div class="panel-header">
                    📋 历史任务 <span class="count" id="history-count">3</span>
                </div>
                <div class="history-list" id="history-list"></div>
                <div class="panel-footer">
                    <button class="btn-new" onclick="newSession()">

                    </button>
                </div>
            </aside>

            <!-- CENTER: Canvas -->
            <main class="panel-center" id="canvas-panel">
                <div class="canvas-toolbar" id="canvas-toolbar">
                    <span class="canvas-label" id="canvas-label"
                        >等待组网数据...</span
                    >
                    <span class="canvas-toolbar-right">
                        <button
                            class="btn-sim"
                            id="btn-start-sim"
                            disabled
                            onclick="startSimulation()"
                        >
                            开始仿真
                        </button>
                        <span
                            class="mesh-config-toolbar"
                            id="mesh-config-toolbar"
                        >
                            <label
                                >TP:
                                <input
                                    id="mesh-tpInput"
                                    type="number"
                                    value="4"
                                    min="1"
                                    max="16"
                            /></label>
                            <label
                                >PP:
                                <input
                                    id="mesh-ppInput"
                                    type="number"
                                    value="4"
                                    min="1"
                                    max="32"
                            /></label>
                            <label
                                >DP:
                                <input
                                    id="mesh-dpInput"
                                    type="number"
                                    value="4"
                                    min="1"
                                    max="8"
                            /></label>
                            <button onclick="canvasRebuild()">Refresh</button>
                            <span id="mesh-npu-count"></span>
                        </span>
                    </span>
                </div>
                <div class="canvas-tabs" id="canvas-tabs">
                    <button
                        class="canvas-tab active"
                        data-tab="modeling"
                        onclick="switchCanvasTab('modeling')"
                    >
                        等效建模分析
                    </button>
                    <button
                        class="canvas-tab"
                        data-tab="simulation"
                        id="tab-btn-simulation"
                        disabled
                        onclick="switchCanvasTab('simulation')"
                    >
                        等效仿真验证
                    </button>
                </div>
                <!-- Tab: 等效建模分析 -->
                <div class="canvas-tab-panel active" id="tab-panel-modeling">
                    <div class="canvas-svg-wrap" id="canvas-svg-wrap">
                        <div id="rank-tooltip"></div>
                        <div id="rank-tooltip-mapped"></div>
                        <div id="model-tooltip"></div>
                        <div id="rank-tooltip-detail"></div>
                        <div id="rank-tooltip-detail-mapped"></div>
                        <div
                            class="canvas-section"
                            id="canvas-section"
                            style="display: none"
                        ></div>
                        <div class="canvas-placeholder" id="canvas-placeholder">
                            <svg width="120" height="100" viewBox="0 0 120 100">
                                <rect
                                    width="120"
                                    height="100"
                                    rx="6"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                    stroke-dasharray="6 4"
                                    opacity="0.4"
                                />
                                <text
                                    x="60"
                                    y="48"
                                    text-anchor="middle"
                                    fill="currentColor"
                                    font-family="JetBrains Mono,monospace"
                                    font-size="11"
                                    opacity="0.6"
                                >
                                    Canvas
                                </text>
                                <text
                                    x="60"
                                    y="66"
                                    text-anchor="middle"
                                    fill="currentColor"
                                    font-family="JetBrains Mono,monospace"
                                    font-size="9"
                                    opacity="0.35"
                                >
                                    生成组网后自动渲染
                                </text>
                            </svg>
                            <p>组网拓扑画布</p>
                            <span>通过 Agent 生成组网后在此可视化</span>
                        </div>
                    </div>
                </div>
                <!-- Tab: 等效仿真验证 -->
                <div class="canvas-tab-panel" id="tab-panel-simulation">
                    <div class="sim-panel-wrap">
                        <div class="sim-topo-area" id="sim-topo-area">

                                class="sim-topo-placeholder"
                                id="sim-topo-placeholder"

                                <svg
                                    width="120"
                                    height="100"
                                    viewBox="0 0 120 100"

                                    <rect
                                        width="120"
                                        height="100"
                                        rx="6"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="1.5"
                                        stroke-dasharray="6 4"
                                        opacity="0.4"
                                    />
                                    <text
                                        x="60"
                                        y="48"
                                        text-anchor="middle"
                                        fill="currentColor"
                                        font-family="JetBrains Mono,monospace"
                                        font-size="11"
                                        opacity="0.6"
                                    >
                                        Sim Topo

                                    <text
                                        x="60"
                                        y="66"
                                        text-anchor="middle"
                                        fill="currentColor"
                                        font-family="JetBrains Mono,monospace"
                                        font-size="9"

                                    </text>

                                <p>等效仿真组网图</p>
                                <span>仿真开始后在此展示原始与等效组网</span>

                            <div
                                class="canvas-section sim-canvas-section"
                                id="sim-canvas-section"

                            ></div>

                        <div class="sim-results-area" id="sim-results-area">
                            <!-- populated dynamically -->
                        </div>
                    </div>
                </div>

                                            min="1"

                                    <input

                                    <input

                                        id="wf-equiv-tp"
                                        value="16"

                                    <input
                                        type="hidden"
                                        id="wf-equiv-pp"
                                        value="3"

                                    <input

                                    sendQuick(

                                    )

                    <div class="chat-input-area">

                            id="btn-send"

                        >

                                fill="none"
                            >

                                    d="M2 8l12-6L8 14l-2-6"
                                    stroke="currentColor"
                                    stroke-width="1.8"

        <!-- Metric Detail Popup -->
        <div id="metric-detail-overlay" style="display: none">
            <div id="metric-detail-popup">
                <div class="metric-detail-header">
                    <span
                        class="metric-detail-title"
                        id="metric-detail-title"
                    ></span>
                    <button
                        class="metric-detail-close"
                        onclick="closeMetricDetailPopup()"
                    >
                        &times;
                    </button>

                <div class="metric-detail-body" id="metric-detail-body"></div>
