                            .attr("x1", gx)
                            .attr("x2", gx)
                            .attr("y1", 0)
                            .attr("y2", stages.length * rowH)
                            .attr("stroke", "#1e2a36")
                            .attr("stroke-width", i % 5 === 0 ? 0.6 : 0.3);
                    }

                    // time axis labels
                    for (var i = 0; i <= nTicks; i++) {
                        var tv = (totalUs * i) / nTicks;
                        g.append("text")
                            .attr("x", (i / nTicks) * plotW)
                            .attr("y", stages.length * rowH + 16)
                            .attr("text-anchor", "middle")
                            .attr("fill", "#4a5568")
                            .attr("font-size", "9px")
                            .attr("font-family", "JetBrains Mono,monospace")
                            .text(formatUs(tv));
                    }

                    var tooltip = d3
                        .select(container)
                        .append("div")
                        .attr("class", "result-tooltip");

                    ops.forEach(function (o) {
                        var si = stages.indexOf(o.stage);
                        if (si < 0) return;
                        var rx = (o.start_time / totalUs) * plotW;
                        var rw = Math.max(2, (o.duration / totalUs) * plotW);
                        var ry = si * rowH + 3;
                        var rh = rowH - 6;
                        var color = TYPE_COLORS[o.comm_type] || "#7b8ca3";
                        var label = TYPE_LABELS[o.comm_type] || o.comm_type;

                        var rect = g
                            .append("rect")
                            .attr("x", rx)
                            .attr("y", ry)
                            .attr("width", rw)
                            .attr("height", rh)
                            .attr("fill", color)
                            .attr("rx", 3)
                            .attr("ry", 3)
                            .attr("opacity", 0.88);

                        rect.on("mouseover", function (ev) {
                            var h =
                                '<div style="font-weight:600;margin-bottom:4px">' +
                                o.stage +
                                "</div>";
                            h +=
                                "<div><b>" +
                                o.operator_name +
                                '</b> · <span style="color:' +
                                color +
                                '">' +
                                label +
                                "</span>";
                            if (o.algo_name) h += " (" + o.algo_name + ")";
                            h += "</div>";
                            if (o.data_shape)
                                h += "<div>Shape: " + o.data_shape + "</div>";
                            if (o.data_type)
                                h += "<div>dtype: " + o.data_type + "</div>";
                            if (o.data_size != null)
                                h +=
                                    "<div>Msg size: " +
                                    formatBytes(o.data_size) +
                                    "</div>";
                            if (o.comm_group)
                                h +=
                                    "<div>Group: " +
                                    o.comm_group +
                                    " &nbsp; size=" +
                                    o.comm_group_size +
                                    "</div>";
                            if (o.additional)
                                h += "<div>Info: " + o.additional + "</div>";
                            h +=
                                "<div>Duration: <b>" +
                                formatUs(o.duration) +
                                "</b></div>";
                            h +=
                                '<div style="color:var(--text-muted)">' +
                                formatUs(o.start_time) +
                                " → " +
                                formatUs(o.end_time) +
                                "</div>";
                            tooltip.classed("show", true).html(h);
                        })
                            .on("mousemove", function (ev) {
                                tooltip
                                    .style("left", ev.clientX + 14 + "px")
                                    .style(
                                        "top",
                                        Math.min(
                                            ev.clientY - 90,
                                            ev.clientY - 10,
                                        ) + "px",
                                    );
                            })
                            .on("mouseout", function () {
                                tooltip.classed("show", false);
                            });
                    });

                    // stage labels
                    stages.forEach(function (s, si) {
                        g.append("text")
                            .attr("x", -8)
                            .attr("y", si * rowH + rowH / 2 + 4)
                            .attr("text-anchor", "end")
                            .attr("fill", "#7b8ca3")
                            .attr("font-size", "9px")
                            .attr("font-family", "JetBrains Mono,monospace")
                            .text(s);
                    });

                    // legend
                    var types = [
                        "computation",
                        "all_reduce",
                        "all_gather",
                        "reduce_scatter",
                        "broadcast",
                    ];
                    var legY = H - 11;
                    types.forEach(function (ct, i) {
                        var lx = leftM + i * 120;
                        svg.append("rect")
                            .attr("x", lx)
                            .attr("y", legY - 8)
                            .attr("width", 10)
                            .attr("height", 10)
                            .attr("fill", TYPE_COLORS[ct])
                            .attr("rx", 2);
                        svg.append("text")
                            .attr("x", lx + 14)
                            .attr("y", legY)
                            .attr("fill", "#7b8ca3")
                            .attr("font-size", "9px")
                            .attr("font-family", "JetBrains Mono,monospace")
                            .text(TYPE_LABELS[ct]);
                    });
                })();

                // ═══ Section 3: 负载描述文件 — full detail table ═══
                (function () {
                    var container = document.getElementById(
                        prefix + "-opspec",
                    );
                    if (!container) return;
                    var rows = data.ops;
                    var html = '<table class="result-op-table"><thead><tr>';
                    html +=
                        "<th>操作名称</th><th>通信类型</th><th>Stage</th><th>通信组</th><th>组大小</th><th>数据形状/大小</th><th>数据类型</th><th>耗时</th><th>附加信息</th><th>非阻塞</th>";
                    html += "</tr></thead><tbody>";
                    rows.forEach(function (r) {
                        var ctColor = TYPE_COLORS[r.comm_type] || "#7b8ca3";
                        var ctLabel = TYPE_LABELS[r.comm_type] || r.comm_type;
                        html += "<tr>";
                        html +=
                            '<td style="color:#c9d1d9">' +
                            r.operator_name +
                            "</td>";
                        html +=
                            '<td><span class="phase-badge" style="background:' +
                            ctColor +
                            "22;color:" +
                            ctColor +
                            '">' +
                            ctLabel +
                            "</span></td>";
                        html += '<td class="cell-stage">' + r.stage + "</td>";
                        html +=
                            '<td style="color:#baa1ff">' +
                            (r.comm_group || "—") +
                            "</td>";
                        html +=
                            '<td style="text-align:center">' +
                            (r.comm_group_size != null
                                ? r.comm_group_size
                                : "—") +
                            "</td>";
                        html +=
                            '<td class="cell-shape">' +
                            (r.data_shape ||
                                (r.data_size != null
                                    ? formatBytes(r.data_size)
                                    : "—")) +
                            "</td>";
                        html +=
                            '<td style="text-align:center">' +
                            (r.data_type || "—") +
                            "</td>";
                        html +=
                            '<td class="cell-flops">' +
                            formatUs(r.duration) +
                            "</td>";
                        html +=
                            '<td style="color:var(--text-muted);max-width:140px;overflow:hidden;text-overflow:ellipsis">' +
                            (r.additional || "—") +
                            "</td>";
                        html +=
                            '<td style="text-align:center">' +
                            (r.nonblock ? "是" : "否") +
                            "</td>";
                        html += "</tr>";
                    });
                    html += "</tbody></table>";
                    container.innerHTML = html;
                })();
            }

            // ── Utility formatters ──

            function formatUs(us) {
                if (us >= 1e6) return (us / 1e6).toFixed(2) + " s";
                if (us >= 1e3) return (us / 1e3).toFixed(1) + " ms";
                return us.toFixed(1) + " μs";
            }
            var TYPE_COLORS = {
                computation: "#39bae6", all_reduce: "#ff8f40",
                all_gather: "#baa1ff", reduce_scatter: "#ffb454",
                broadcast: "#7fd962", send: "#f26d78", recv: "#f26d78",
                barrier: "#4a5568",
            };
            var TYPE_LABELS = {
                computation: "Compute", all_reduce: "AllReduce",
                all_gather: "AllGather", reduce_scatter: "ReduceScatter",
                broadcast: "Broadcast", send: "Send", recv: "Recv",
                barrier: "Barrier",
            };

            function formatBytes(bytes) {
                if (bytes >= 1e9) return (bytes / 1e9).toFixed(2) + " GB";
                if (bytes >= 1e6) return (bytes / 1e6).toFixed(1) + " MB";
                if (bytes >= 1e3) return (bytes / 1e3).toFixed(1) + " KB";
                return bytes + " B";
            }


            // ── Simulation tab draggable resize ──
            (function () {
                var handle = document.getElementById("sim-resize-handle");
                var topoArea = document.getElementById("sim-topo-area");
                var wrap = document.querySelector(".sim-panel-wrap");
                if (!handle || !topoArea || !wrap) return;
                var dragging = false;
                handle.addEventListener("mousedown", function (e) {
                    dragging = true;
                    handle.classList.add("active");
                    document.body.style.cursor = "row-resize";
                    document.body.style.userSelect = "none";
                    e.preventDefault();
                });
                document.addEventListener("mousemove", function (e) {
                    if (!dragging) return;
                    var rect = wrap.getBoundingClientRect();
                    var pct = ((e.clientY - rect.top) / rect.height) * 100;
                    pct = Math.max(15, Math.min(80, pct));
                    topoArea.style.flex = "0 0 " + pct + "%";
                });
                document.addEventListener("mouseup", function () {
                    if (!dragging) return;
                    dragging = false;
                    handle.classList.remove("active");
                    document.body.style.cursor = "";
                    document.body.style.userSelect = "";
                });
            })();

            function _renderSimResults() {
                var area = document.getElementById("sim-results-area");
                if (!area) return;
                var hasSim = (
                    (typeof meshActualOrig !== "undefined" && Object.keys(meshActualOrig || {}).length) ||
                    (typeof meshActualEq !== "undefined" && Object.keys(meshActualEq || {}).length)
                );
                if (!hasSim) {
                    area.innerHTML =
                        '<div class="sim-results-placeholder" style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-family:var(--font-mono);font-size:13px">'
                        + '<span>等待仿真数据...<br/><small>点击上方组网图中的 Rank 卡片查看详情</small></span></div>';
                    return;
                }
                if (!meshPinnedRank) {
                    area.innerHTML =
                        '<div class="sim-results-placeholder" style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-family:var(--font-mono);font-size:13px">'
                        + '<span>点击上方组网图中的 Rank 卡片<br/>查看原始 vs 等效对比详情</span></div>';
                    return;
                }

                // Get rank position info from the pinned side
                var topo = meshPinnedRank.side === "orig" ? meshOriginal : meshEquivalent;
                if (!topo) { area.innerHTML = '<span style="color:var(--text-muted)">无拓扑数据</span>'; return; }
                var ranksPerDp = topo.tp * topo.pp;
                var gr = meshPinnedRank.globalRank;
                var rankInfo = {
                    globalRank: gr,
                    dpIdx: Math.floor(gr / ranksPerDp),
                    ppIdx: Math.floor((gr % ranksPerDp) / topo.tp),
                    tpIdx: (gr % ranksPerDp) % topo.tp,
                    tpSize: topo.tp, ppSize: topo.pp, dpSize: topo.dp
                };

                // Map to the other side's corresponding rank at same DP/TP/PP position
                var otherTopo = meshPinnedRank.side === "orig" ? meshEquivalent : meshOriginal;
                var otherRankInfo = null;
                if (otherTopo) {
                    var oRanksPerDp = otherTopo.tp * otherTopo.pp;
                    var oDpIdx = Math.min(rankInfo.dpIdx, otherTopo.dp - 1);
                    var oPpIdx = Math.min(rankInfo.ppIdx, otherTopo.pp - 1);
                    var oTpIdx = Math.min(rankInfo.tpIdx, otherTopo.tp - 1);
                    var oGR = oDpIdx * oRanksPerDp + oPpIdx * otherTopo.tp + oTpIdx;
                    otherRankInfo = {
                        globalRank: oGR,
                        dpIdx: oDpIdx, ppIdx: oPpIdx, tpIdx: oTpIdx,
                        tpSize: otherTopo.tp, ppSize: otherTopo.pp, dpSize: otherTopo.dp
                    };
                }

                var origInfo = meshPinnedRank.side === "orig" ? rankInfo : otherRankInfo;
                var eqInfo = meshPinnedRank.side === "orig" ? otherRankInfo : rankInfo;

                // Build the two-column layout
                var sections = [
                    { id: "hbm", title: "HBM Memory 统计", sub: "Memory Usage — 权重 · 梯度 · 优化器 · 激活 · 通信缓冲" },
                    { id: "loadseq", title: "负载序列记录", sub: "Pipeline Load Sequence — 各阶段计算·通信·显存·空闲占比" },
                    { id: "timeline", title: "算子执行时序", sub: "Operator Timeline — 横轴时间 · 颜色区分算子类型" },
                    { id: "opspec", title: "负载描述文件", sub: "Operator Spec — 算子 Shape · Stage · Phase 描述" }
                ];

                var html = '<div style="padding:6px 10px;overflow-y:auto;height:100%">';
                // Header bar
                html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding:6px 8px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px">';
                html += '<div><span style="color:#58a6ff;font-weight:600;font-size:12px">原始组网</span>';
                html += '<span style="color:var(--text-muted);font-size:10px;margin-left:8px">Rank #' + (origInfo?origInfo.globalRank:"—") + ' · TP' + (origInfo?origInfo.tpIdx:"—") + ' PP' + (origInfo?origInfo.ppIdx:"—") + ' DP' + (origInfo?origInfo.dpIdx:"—") + '</span></div>';
                html += '<span style="color:var(--text-muted);font-size:10px">↔ 对比</span>';
                html += '<div style="text-align:right"><span style="color:var(--teal);font-weight:600;font-size:12px">等效组网</span>';
                html += '<span style="color:var(--text-muted);font-size:10px;margin-left:8px">Rank #' + (eqInfo?eqInfo.globalRank:"—") + ' · TP' + (eqInfo?eqInfo.tpIdx:"—") + ' PP' + (eqInfo?eqInfo.ppIdx:"—") + ' DP' + (eqInfo?eqInfo.dpIdx:"—") + '</span></div>';
                html += '</div>';

                sections.forEach(function (sec) {
                    html += '<div style="margin-bottom:6px">';
                    html += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">';
                    html += '<span style="font-size:11px;font-weight:600;color:var(--text-primary)">' + sec.title + '</span>';
                    html += '<span style="font-size:9px;color:var(--text-muted)">' + sec.sub + '</span>';
                    html += '</div>';
                    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
                    html += '<div class="result-chart" id="orig-' + sec.id + '" style="min-height:100px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;overflow:hidden"></div>';
                    html += '<div class="result-chart" id="eq-' + sec.id + '" style="min-height:100px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;overflow:hidden"></div>';
                    html += '</div></div>';
                });
                html += '</div>';
                area.innerHTML = html;

                // Render both sides with a tiny delay to allow DOM layout
                if (origInfo) setTimeout(function() { _renderSideDetail("orig", origInfo); }, 50);
                if (eqInfo) setTimeout(function() { _renderSideDetail("eq", eqInfo); }, 100);
            }
            function checkSimReady() {
                var btn = document.getElementById("btn-start-sim");
                var simTabBtn = document.getElementById("tab-btn-simulation");
                // Already completed — show done state
                if (_simCompleted) {
                    if (btn) { btn.disabled = true; btn.textContent = "仿真已完成"; btn.classList.add("sim-done"); }
                    if (simTabBtn) simTabBtn.disabled = false;
                    return;
                }
                var hasOriginal = !!(meshOriginal && modelOriginal);
                var hasEquivalent = !!(meshEquivalent && modelEquivalent);
                var ready = hasOriginal && hasEquivalent;
                if (btn) {
                    btn.disabled = !ready;
                    btn.textContent = "开始仿真";
                    btn.classList.remove("sim-done");
                }
                // Enable simulation tab when simulation data exists or has run
                if (simTabBtn) {
                    var hasSimData = (
                        (typeof meshActualOrig !== "undefined" && Object.keys(meshActualOrig || {}).length) ||
                        (typeof meshActualEq !== "undefined" && Object.keys(meshActualEq || {}).length)
                    );
                    simTabBtn.disabled = !(ready || hasSimData || _simCompleted);
                }
            }

            async function startSimulation(simParams) {
                var btn = document.getElementById("btn-start-sim");
                if (!btn || btn.disabled) return;

                btn.disabled = true;
                btn.textContent = "仿真中...";
                setStatus("thinking");
                updateWorkflowNode("simulation", "active");
                addMessage("system", "📊 开始仿真任务...");

                // Switch to simulation tab immediately
                switchCanvasTab("simulation");

                // Build request body with optional simulation params
                var body = {};
                var params = simParams || getDefaultSimParams();
                body.simulation_params = params;

                try {
                    var resp = await fetch(
                        API + "/session/" + sessionId + "/run-simulation",
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(body),
                        },
                    );

                    if (!resp.ok) {
                        addMessage(
                            "error",
                            "仿真请求失败: HTTP " + resp.status,
                        );
                        btn.textContent = "开始仿真";
                        btn.disabled = false;
                        setStatus("error");
                        return;
                    }

                    var data = await resp.json();
                    var results = data.results || {};

                    // Populate per-card metric maps (used by meshRebuild)
                    if (results.original && results.original.cards) {
                        meshActualOrig = {};
                        results.original.cards.forEach(function (c) {
                            meshActualOrig[c.global_rank] = c;
                        });
                    }
                    if (results.equivalent && results.equivalent.cards) {
                        meshActualEq = {};
                        results.equivalent.cards.forEach(function (c) {
                            meshActualEq[c.global_rank] = c;
                        });
                    }

                    updateWorkflowNode("simulation", "completed");
                    if (results.comparison) {
                        if (results.comparison.is_equivalent === false) {
                            updateWorkflowNode("comparison", "failed");
                            addMessage(
                                "system",
                                "⚠️ 仿真完成，等效性对比存在差异，请检查",
                            );
                        } else {
                            updateWorkflowNode("comparison", "completed");
                            addMessage(
                                "system",
                                "✅ 仿真验证已通过，等效性对比一致",
                            );
                        }
                    } else {
                        updateWorkflowNode("comparison", "active");
                        addMessage("system", "📊 仿真任务已提交");
                    }

                    _simCompleted = true;
                    checkSimReady();
                    setStatus("idle");
                    // Re-render sim canvas with actual data + refresh results
                    _showActualData = true;
                    if (typeof canvasRebuild === "function") canvasRebuild("#sim-canvas-section");
                    if (typeof canvasRecenter === "function") canvasRecenter("#sim-canvas-section");
                    _renderSimResults();
                } catch (e) {
                    setStatus("error");
                    addMessage("error", "仿真异常: " + e.message);
                    updateWorkflowNode("simulation", "failed");
                    btn.textContent = "开始仿真";
                    btn.disabled = false;
                }
            }

            var _resultsRendered = false;
            var _simCompleted = false;

            function handleKeyDown(e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            }

            function sendQuick(text) {
                document.getElementById("chat-input").value = text;
                updateWorkflowNode("params", "completed");
                sendMessage();
            }

            // ── Init ──
            renderHistory();

            (async function init() {
                const saved = JSON.parse(
                    localStorage.getItem("mesh_session") || "{}",
                );
                const savedId = saved.id || "";
                if (savedId && (await restoreSession(savedId))) {
                    document.getElementById("chat-input").focus();
                    return;
                }
                await ensureSession();
                initWorkflow();
                document.getElementById("chat-input").focus();
            })();
        </script>
        <script src="/static/topo-renderer.js?v=20260506"></script>
    </body>
</html>
