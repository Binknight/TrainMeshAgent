        <script>
            const API = "/api";
            let sessionId = "";
            let isStreaming = false;
            let _pendingMeshList = []; // batch mesh_json events until "done"
            let _pendingModelList = []; // batch model_json events until "done"

            // ═══════════════════════════════════════════
            // Workflow State Machine
            // ═══════════════════════════════════════════

            const WORKFLOW_STEPS = [
                {
                    id: "params",
                    label: "等效参数输入",
                    icon: "\u{1F4DD}",
                    requiresInput: true,
                    requiresConfirm: false,
                },
                {
                    id: "equiv_calc",
                    label: "等效计算",
                    icon: "\u{1F4D0}",
                    requiresInput: false,
                    requiresConfirm: true,
                    isParent: true,
                },
                {
                    id: "equiv_calc_sub1",
                    label: "策略加载",
                    icon: "●",
                    requiresInput: false,
                    requiresConfirm: false,
                    parentId: "equiv_calc",
                    isChild: true,
                },
                {
                    id: "equiv_calc_sub2",
                    label: "指标分析",
                    icon: "●",
                    requiresInput: false,
                    requiresConfirm: false,
                    parentId: "equiv_calc",
                    isChild: true,
                },
                {
                    id: "equiv_calc_sub3",
                    label: "公式计算",
                    icon: "●",
                    requiresInput: false,
                    requiresConfirm: false,
                    parentId: "equiv_calc",
                    isChild: true,
                },
                {
                    id: "equiv_gen",
                    label: "等效组网及模型渲染",
                    icon: "\u{1F9E0}",
                    requiresInput: false,
                    requiresConfirm: false,
                },
                {
                    id: "simulation",
                    label: "仿真验证",
                    icon: "\u{1F52C}",
                    requiresInput: false,
                    requiresConfirm: true,
                },
                {
                    id: "comparison",
                    label: "结果分析",
                    icon: "\u{1F4CA}",
                    requiresInput: false,
                    requiresConfirm: false,
                },
                {
                    id: "virtual_real",
                    label: "虚实结合",
                    icon: "\u{1F517}",
                    requiresInput: false,
                    requiresConfirm: true,
                    disabled: true,
                },
            ];

            var workflowMode = "api"; // "api" (default) | "agent" (AI toggle on)
            var workflowNodeStates = {}; // { stepId: 'pending' | 'active' | 'completed' | 'failed' | 'waiting_input' | 'disabled' }
            var workflowHighestCompleted = -1; // index of the furthest completed step
            var _pendingWorkflowState = null; // deferred workflow_state SSE data, applied after staged rendering
            var _pendingSimData = false; // flag: sim_data arrived, apply in done handler

            function initWorkflow() {
                // restore persisted mode
                workflowMode = localStorage.getItem("workflowMode") || "api";
                updateModeSwitchUI();
                workflowNodeStates = {};
                workflowHighestCompleted = -1;
                WORKFLOW_STEPS.forEach(function (step, i) {
                    if (step.disabled) {
                        workflowNodeStates[step.id] = "disabled";
                    } else if (i === 0) {
                        workflowNodeStates[step.id] = "waiting_input";
                    } else {
                        workflowNodeStates[step.id] = "pending";
                    }
                });
                // Reset formula card state for new session
                _formulaCardReady = false;
                _pendingFormulaLines = [];
                _formulaLineY = 0;
                _formulaCardG = null;
                _formulaCardRect = null;
                renderWorkflow();
            }

            function toggleWorkflowMode() {
                var toggle = document.getElementById("ai-mode-toggle");
                workflowMode = toggle && toggle.checked ? "agent" : "api";
                localStorage.setItem("workflowMode", workflowMode);
            }
            function updateModeSwitchUI() {
                var toggle = document.getElementById("ai-mode-toggle");
                if (toggle) toggle.checked = workflowMode === "agent";
            }

            // ── API mode submit stubs (called when workflowMode === "api") ──

            async function submitStep1(params) {
                setStatus("thinking");
                addMessage(
                    "system",
                    "📡 [API] 提交参数，生成原始组网与模型...",
                );
                try {
                    var resp = await fetch(
                        API + "/session/" + sessionId + "/workflow/step1",
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(params),
                        },
                    );
                    if (!resp.ok) {
                        var err = await resp.json().catch(function () {
                            return {};
                        });
                        throw new Error(
                            err.message ||
                                err.error ||
                                "Step1 请求失败 (" + resp.status + ")",
                        );
                    }
                    var data = await resp.json();
                    if (data.original_mesh) {
                        handleWorkflowEvent({
                            type: "mesh_json",
                            data: data.original_mesh,
                        });
                    }
                    if (data.original_model) {
                        handleWorkflowEvent({
                            type: "model_json",
                            data: data.original_model,
                        });
                    }
                    handleWorkflowEvent({
                        type: "done",
                        data: { stage: "step1" },
                    });
                } catch (e) {
                    setStatus("error");
                    addMessage("error", "Step 1 失败: " + e.message);
                    updateWorkflowNode("params", "failed");
                }
            }

            async function submitStep2() {
                setStatus("thinking");
                addMessage("system", "📡 [API] 开始等效计算...");
                updateWorkflowNode("equiv_calc_sub1", "active");
                // Show formula card only after user confirms step2
                _formulaCardReady = true;
                canvasRebuild();
                if (typeof canvasRecenter === "function") canvasRecenter();
                try {
                    // trigger backend computation
                    var triggerResp = await fetch(
                        API + "/session/" + sessionId + "/workflow/step2",
                        {
                            method: "POST",
                        },
                    );
                    if (!triggerResp.ok)
                        throw new Error(
                            "Step2 触发失败 (" + triggerResp.status + ")",
                        );
                    // connect SSE stream for line-by-line loading
                    var url =
                        API +
                        "/session/" +
                        sessionId +
                        "/workflow/step2/stream";
                    var eventSource = new EventSource(url);
                    var step2Done = false;
                    eventSource.onmessage = function (e) {
                        try {
                            var event = JSON.parse(e.data);
                            handleWorkflowEvent(event);
                            if (event.type === "done") {
                                step2Done = true;
                                eventSource.close();
                                // Auto-trigger Step 3 after Step 2 SSE stream ends (with visible pause)
                                setTimeout(function () {
                                    submitStep3();
                                }, 1500);
                            }
                            if (event.type === "error") {
                                eventSource.close();
                            }
                        } catch (parseErr) {
                            console.warn("Step2 SSE parse error:", parseErr);
                        }
                    };
                    eventSource.onerror = function () {
                        eventSource.close();
                        if (!step2Done) {
                            setStatus("error");
                            addMessage("error", "等效计算 SSE 连接中断");
                        }
                        // If step2Done is true, submitStep3 already called in onmessage
                    };
                } catch (e) {
                    setStatus("error");
                    addMessage("error", "Step 2 失败: " + e.message);
                    updateWorkflowNode("equiv_calc", "failed");
                }
            }

            async function submitStep3() {
                console.log("[DEBUG] submitStep3 called");
                setStatus("thinking");
                addMessage("system", "📡 [API] 生成等效组网与模型结构...");
                updateWorkflowNode("equiv_gen", "active");
                try {
                    var resp = await fetch(
                        API + "/session/" + sessionId + "/workflow/step3",
                        {
                            method: "POST",
                        },
                    );
                    console.log("[DEBUG] step3 response status:", resp.status);
                    if (!resp.ok) {
                        var err = await resp.json().catch(function () {
                            return {};
                        });
                        throw new Error(
                            err.message ||
                                err.error ||
                                "Step3 请求失败 (" + resp.status + ")",
                        );
                    }
                    var data = await resp.json();
                    console.log(
                        "[DEBUG] step3 data:",
                        Object.keys(data),
                        "has eq_mesh:",
                        !!data.equivalent_mesh,
                        "has eq_model:",
                        !!data.equivalent_model,
                    );

                    // Staged rendering: mesh first, pause, then model, pause, then done
                    if (data.equivalent_mesh) {
                        console.log(
                            "[DEBUG] dispatching mesh_json for equivalent",
                        );
                        handleWorkflowEvent({
                            type: "mesh_json",
                            data: data.equivalent_mesh,
                        });
                        canvasRebuild();
                        if (typeof canvasRecenter === "function")
                            canvasRecenter();
                        await renderThenSleep(800);
                    }
                    if (data.equivalent_model) {
                        console.log(
                            "[DEBUG] dispatching model_json for equivalent",
                        );
                        handleWorkflowEvent({
                            type: "model_json",
                            data: data.equivalent_model,
                        });
                        canvasRebuild();
                        if (typeof canvasRecenter === "function")
                            canvasRecenter();
                        await renderThenSleep(800);
                    }
                    console.log("[DEBUG] dispatching done stage=step3");
                    handleWorkflowEvent({
                        type: "done",
                        data: { stage: "step3" },
                    });
                } catch (e) {
                    console.error("[DEBUG] step3 error:", e);
                    setStatus("error");
                    addMessage("error", "Step 3 失败: " + e.message);
                    updateWorkflowNode("equiv_gen", "failed");
                }
            }

            // ── Unified workflow event handler (shared by Agent SSE and API modes) ──

            function handleWorkflowEvent(event) {
                console.log("[DEBUG] handleWorkflowEvent type:", event.type);
                switch (event.type) {
                    case "mesh_json":
                        loadMeshData(event.data);
                        break;
                    case "model_json":
                        var modelPayload = event.data;
                        if (!modelPayload._role) {
                            var modelName = (
                                modelPayload.name || ""
                            ).toLowerCase();
                            if (
                                modelName.indexOf("原始") !== -1 ||
                                modelName.indexOf("original") !== -1
                            ) {
                                modelPayload._role = "original";
                            } else if (
                                modelName.indexOf("等效") !== -1 ||
                                modelName.indexOf("equivalent") !== -1
                            ) {
                                modelPayload._role = "equivalent";
                            }
                        }
                        loadModelData(modelPayload, modelPayload._role);
                        break;
                    case "equiv_formula_line":
                        if (typeof _appendFormulaLine === "function") {
                            _appendFormulaLine(event.section, event.line);
                        }
                        if (event.section_done) {
                            var stepMap = {
                                strategy: "equiv_calc_sub1",
                                metrics: "equiv_calc_sub2",
                                formula: "equiv_calc_sub3",
                            };
                            var stepId = stepMap[event.section];
                            if (stepId) updateWorkflowNode(stepId, "completed");
                            // Persist formula lines on last section so refresh doesn't lose them
                            if (
                                event.section === "formula" &&
                                sessionId &&
                                window._pendingFormulaLines &&
                                window._pendingFormulaLines.length
                            ) {
                                try {
                                    sessionStorage.setItem(
                                        "formulaLines_" + sessionId,
                                        JSON.stringify(
                                            window._pendingFormulaLines,
                                        ),
                                    );
                                } catch (e) {
                                    /* ignore quota errors */
                                }
                            }
                        }
                        break;
                    case "done":
                        handleDone(event.data);
                        break;
                    case "error":
                        setStatus("error");
                        addMessage("error", event.message || "未知错误");
                        break;
                }
            }

            var STAGE_DELAY_MS = 600; // 阶段间延时（毫秒）

            function renderThenSleep(ms) {
                return new Promise(function (resolve) {
                    requestAnimationFrame(function () {
                        setTimeout(resolve, ms || STAGE_DELAY_MS);
                    });
                });
            }

            async function handleDone(doneData) {
                console.log(
                    "[DEBUG] handleDone stage:",
                    doneData.stage,
                    "pendingMeshList:",
                    _pendingMeshList.length,
                    "pendingModelList:",
                    _pendingModelList.length,
                );
                setStatus("idle");
                fetchSimulationData();

                var stage = doneData.stage || "auto";
                var origMesh = null,
                    eqMesh = null;

                // Sort pending mesh list into orig/eq
                if (_pendingMeshList.length) {
                    _pendingMeshList.forEach(function (d) {
                        var nm = (d.name || "").toLowerCase();
                        if (nm.indexOf("原始") !== -1) origMesh = d;
                        else eqMesh = d;
                    });
                }

                // ── Stage "step1": 原始组网 + 原始模型结构 → single mode, centered ──
                if (stage === "step1" || stage === "auto") {
                    if (origMesh) {
                        await loadMeshData(origMesh);
                        canvasRebuild();
                        if (typeof canvasRecenter === "function")
                            canvasRecenter();
                        await renderThenSleep(STAGE_DELAY_MS);
                    }
                    if (_pendingModelList.length) {
                        _pendingModelList.forEach(function (d) {
                            loadModelData(d, d._role);
                        });
                        _pendingModelList = [];
                        canvasRebuild();
                        if (typeof canvasRecenter === "function")
                            canvasRecenter();
                        await renderThenSleep(STAGE_DELAY_MS);
                    }
                    _pendingMeshList = [];
                }

                // ── Stage "step2": 等效计算完成 → sub-steps already done via equiv_formula_line ──
                if (
                    stage === "step2" ||
                    (stage === "auto" &&
                        workflowNodeStates["equiv_calc_sub3"] === "completed")
                ) {
                    // All equiv_calc sub-steps completed, mark parent with visible pause
                    await renderThenSleep(STAGE_DELAY_MS);
                    if (workflowNodeStates["equiv_calc"] !== "completed") {
                        updateWorkflowNode("equiv_calc", "completed");
                    }
                }

                // ── Stage "step3": 等效组网 + 模型结构 → compare mode, centered ──
                if (stage === "step3" || (stage === "auto" && eqMesh)) {
                    console.log(
                        "[DEBUG] handleDone stage=step3, eqMesh:",
                        !!eqMesh,
                        "window.meshOriginal:",
                        !!window.meshOriginal,
                        "window.meshEquivalent:",
                        !!window.meshEquivalent,
                    );
                    if (eqMesh) {
                        console.log("[DEBUG] loading mesh from pending list");
                        await loadMeshData(eqMesh);
                        canvasRebuild();
                        if (typeof canvasRecenter === "function")
                            canvasRecenter();
                        await renderThenSleep(STAGE_DELAY_MS);
                    }
                    if (_pendingModelList.length) {
                        console.log(
                            "[DEBUG] loading",
                            _pendingModelList.length,
                            "models from pending list",
                        );
                        _pendingModelList.forEach(function (d) {
                            loadModelData(d, d._role);
                        });
                        _pendingModelList = [];
                    }
                    _pendingMeshList = [];
                    console.log(
                        "[DEBUG] updating nodes, calling canvasRebuild + canvasRecenter",
                    );
                    updateWorkflowNode("equiv_gen", "completed");
                    canvasRebuild();
                    if (typeof canvasRecenter === "function") canvasRecenter();
                    await renderThenSleep(STAGE_DELAY_MS);
                    updateWorkflowNode("simulation", "active");
                }

                // ── Stage "step4": 仿真验证完成 → switch to simulation tab ──
                if (
                    stage === "step4" ||
                    (_pendingSimData && stage === "auto")
                ) {
                    if (_pendingSimData) {
                        updateWorkflowNode("simulation", "completed");
                        if (typeof switchCanvasTab === "function") {
                            switchCanvasTab("simulation");
                        }
                        canvasRebuild();
                        if (typeof canvasRecenter === "function")
                            canvasRecenter();
                        await renderThenSleep(STAGE_DELAY_MS);
                        _pendingSimData = false;
                    }
                }

                // ── Stage "step5": 结果分析 ──
                if (
                    _pendingWorkflowState &&
                    _pendingWorkflowState.comparison_report
                ) {
                    var isEq = _pendingWorkflowState.comparison_equivalent;
                    updateWorkflowNode(
                        "comparison",
                        isEq === false ? "failed" : "completed",
                    );
                    await renderThenSleep(STAGE_DELAY_MS);
                }

                // Final sync from loaded data + deferred backend state
                syncWorkflowFromLoadedData();
                if (_pendingWorkflowState) {
                    syncWorkflowFromSession(_pendingWorkflowState);
                    _pendingWorkflowState = null;
                }

                // Final canvas rebuild to ensure everything is rendered
                if (
                    meshOriginal ||
                    meshEquivalent ||
                    modelOriginal ||
                    modelEquivalent
                ) {
                    canvasRebuild();
                }
            }

            function getNodeStateClass(stepId) {
                var state = workflowNodeStates[stepId] || "pending";
                return "wf-node-rect " + state;
            }

            function getStatusColor(state) {
                switch (state) {
                    case "completed":
                        return "var(--green)";
                    case "active":
                        return "var(--cyan)";
                    case "failed":
                        return "var(--red)";
                    case "waiting_input":
                        return "var(--yellow)";
                    case "disabled":
                        return "var(--text-muted)";
                    default:
                        return "var(--border)";
                }
            }

            function getConfirmLabel(stepId) {
                switch (stepId) {
                    case "equiv_calc":
                        return "开始等效计算";
                    case "simulation":
                        return "开始仿真";
                    default:
                        return "确认执行";
                }
            }

            function renderWorkflow() {
                var container = document.getElementById("workflow-svg-wrap");
                if (!container) return;
                var W = container.clientWidth - 16;
                if (W < 200) W = 360;
                var nodeH = 32,
                    childNodeH = 22,
                    gapH = 18,
                    topPad = 10;
                var maxNodeW = Math.min(280, W - 40);
                var nodeW = maxNodeW;
                var childNodeW = nodeW - 60;
                var offsetX = (W - nodeW) / 2;
                var childOffsetX = offsetX + (nodeW - childNodeW) / 2;
                var allVisible = WORKFLOW_STEPS;

                // Pre-compute cumulative Y positions (child nodes use smaller height)
                var cumY = 0;
                var stepY = [];
                allVisible.forEach(function (s) {
                    stepY.push(cumY);
                    cumY += (s.isChild ? childNodeH : nodeH) + gapH;
                });
                var totalH = cumY - gapH + topPad * 2;
                var svgH = Math.max(totalH, container.clientHeight - 8);

                container.innerHTML = "";
                var svg = d3
                    .select(container)
                    .append("svg")
                    .attr("width", W)
                    .attr("height", svgH);

                var g = svg
                    .append("g")
                    .attr(
                        "transform",
                        "translate(" + offsetX + "," + topPad + ")",
                    );

                allVisible.forEach(function (step, i) {
                    var y = stepY[i];
                    var state = workflowNodeStates[step.id] || "pending";
                    var isChild = !!step.isChild;
                    var currH = isChild ? childNodeH : nodeH;
                    var currW = isChild ? childNodeW : nodeW;
                    var currX = isChild ? childOffsetX - offsetX : 0;

                    var prevStep = i > 0 ? allVisible[i - 1] : null;
                    var prevState = prevStep
                        ? workflowNodeStates[prevStep.id] || "pending"
                        : null;
                    var isPrevCompleted = prevStep && prevState === "completed";
                    var isCurCompleted = state === "completed";

                    // Arrow between steps (skip for parent→first-child, use connector instead)
                    if (i > 0 && !(prevStep.isParent && step.isChild)) {
                        var prevH = prevStep.isChild ? childNodeH : nodeH;
                        var prevY = stepY[i - 1] + prevH;
                        var arrowH = isChild ? 10 : 16,
                            arrowW = isChild ? 8 : 12;
                        var arrowSrc =
                            isCurCompleted || isPrevCompleted
                                ? "/static/assets/down_arrow_green.png"
                                : "/static/assets/down_arrow_grey.png";
                        var arrowCenterX = nodeW / 2;
                        g.append("image")
                            .attr("x", arrowCenterX - arrowW / 2)
                            .attr("y", prevY + (gapH - arrowH) / 2)
                            .attr("width", arrowW)
                            .attr("height", arrowH)
                            .attr("href", arrowSrc);
                    }

                    // Connector line from parent to first child (centers aligned)
                    if (prevStep && prevStep.isParent && step.isChild) {
                        var connY = stepY[i - 1] + nodeH;
                        g.append("line")
                            .attr("x1", nodeW / 2)
                            .attr("y1", connY)
                            .attr("x2", nodeW / 2)
                            .attr("y2", connY + gapH / 2)
                            .attr(
                                "stroke",
                                isCurCompleted
                                    ? "var(--green)"
                                    : "var(--border)",
                            )
                            .attr("stroke-width", 1)
                            .attr("stroke-dasharray", "2,2");
                        g.append("line")
                            .attr("x1", nodeW / 2)
                            .attr("y1", connY + gapH / 2)
                            .attr("x2", nodeW / 2)
                            .attr("y2", y)
                            .attr(
                                "stroke",
                                isCurCompleted
                                    ? "var(--green)"
                                    : "var(--border)",
                            )
                            .attr("stroke-width", 1)
                            .attr("stroke-dasharray", "2,2");
                    }

                    // Node rect
                    var rect = g
                        .append("rect")
                        .attr("x", currX)
                        .attr("y", y)
                        .attr("width", currW)
                        .attr("height", currH)
                        .attr("rx", isChild ? 4 : 6)
                        .attr("ry", isChild ? 4 : 6)
                        .attr("class", getNodeStateClass(step.id));

                    // Status dot
                    g.append("circle")
                        .attr("cx", currX + (isChild ? 12 : 16))
                        .attr("cy", y + currH / 2)
                        .attr("r", isChild ? 3 : 5)
                        .attr("fill", getStatusColor(state))
                        .attr("class", "wf-status-dot");

                    // icon + label
                    var labelText =
                        (isChild ? "" : step.icon + " ") + step.label;
                    if (step.disabled) labelText += " (暂未开放)";
                    g.append("text")
                        .attr("x", currX + currW / 2)
                        .attr("y", y + currH / 2 + 4)
                        .attr("text-anchor", "middle")
                        .attr(
                            "fill",
                            state === "disabled"
                                ? "var(--text-muted)"
                                : "var(--text-primary)",
                        )
                        .attr("font-size", isChild ? "11px" : "13px")
                        .attr("font-family", "var(--font-sans)")
                        .attr("font-weight", state === "active" ? "600" : "400")
                        .text(labelText);

                    // completed checkmark
                    if (state === "completed") {
                        g.append("text")
                            .attr("x", currX + currW - (isChild ? 14 : 18))
                            .attr("y", y + currH / 2 + 4)
                            .attr("text-anchor", "end")
                            .attr("fill", "var(--green)")
                            .attr("font-size", isChild ? "10px" : "12px")
                            .text("\u2713");
                    }

                    // click handler
                    if (!step.disabled) {
                        rect.style("cursor", "pointer").on(
                            "click",
                            function () {
                                handleWorkflowNodeClick(step);
                            },
                        );
                    }
                });
            }

            function handleWorkflowNodeClick(step) {
                if (step.disabled) return;

                var state = workflowNodeStates[step.id] || "pending";

                // Parent with children: confirm triggers the process that completes children
                if (
                    step.isParent &&
                    step.requiresConfirm &&
                    state === "active"
                ) {
                    confirmWorkflowStep(step);
                    return;
                }

                if (
                    step.requiresInput &&
                    (state === "waiting_input" || state === "active")
                ) {
                    openWorkflowParams();
                    return;
                }

                // Step 4: simulation → open params form instead of auto-confirm
                if (
                    step.id === "simulation" &&
                    step.requiresConfirm &&
                    state === "active"
                ) {
                    openSimParams();
                    return;
                }

                if (step.requiresConfirm && state === "active") {
                    confirmWorkflowStep(step);
                    return;
                }
            }

            function confirmWorkflowStep(step) {
                switch (step.id) {
                    case "equiv_calc":
                        if (workflowMode === "api") {
                            submitStep2();
                        } else {
                            sendMessage("确认开始等效计算");
                        }
                        break;
                    case "simulation":
                        if (workflowMode === "api") {
                            openSimParams();
                        } else {
                            var parts = [];
                            if (
                                typeof meshOriginal !== "undefined" &&
                                meshOriginal
                            )
                                parts.push("原始组网");
                            if (
                                typeof meshEquivalent !== "undefined" &&
                                meshEquivalent
                            )
                                parts.push("等效组网");
                            var msg =
                                (parts.length ? parts.join("和") : "组网") +
                                " 数据已就绪，请开始仿真";
                            sendMessage(msg);
                        }
                        break;
                    default:
                        sendMessage("确认执行下一步");
                }
                // mark as completed immediately for UI responsiveness
                updateWorkflowNode(step.id, "completed");
            }

            function updateWorkflowNode(stepId, newState) {
                if (newState === "active") {
                    // mutual exclusion: deactivate any other currently active step
                    for (var id in workflowNodeStates) {
                        if (
                            id !== stepId &&
                            workflowNodeStates[id] === "active"
                        ) {
                            workflowNodeStates[id] = "pending";
                        }
                    }
                    // Activate parent if this is a child step
                    var currentStep = WORKFLOW_STEPS.find(function (s) {
                        return s.id === stepId;
                    });
                    if (
                        currentStep &&
                        currentStep.parentId &&
                        workflowNodeStates[currentStep.parentId] !== "completed"
                    ) {
                        workflowNodeStates[currentStep.parentId] = "active";
                    }
                }
                workflowNodeStates[stepId] = newState;
                if (newState === "completed") {
                    var idx = WORKFLOW_STEPS.findIndex(function (s) {
                        return s.id === stepId;
                    });
                    if (idx > workflowHighestCompleted)
                        workflowHighestCompleted = idx;
                    var completedStep = WORKFLOW_STEPS.find(function (s) {
                        return s.id === stepId;
                    });
                    if (completedStep && completedStep.parentId) {
                        // Child step completed: activate next pending sibling (if any)
                        var parentId = completedStep.parentId;
                        var children = WORKFLOW_STEPS.filter(function (s) {
                            return s.parentId === parentId;
                        });
                        var myChildIdx = children.findIndex(function (c) {
                            return c.id === stepId;
                        });
                        if (
                            myChildIdx >= 0 &&
                            myChildIdx < children.length - 1
                        ) {
                            var nextSibling = children[myChildIdx + 1];
                            if (
                                !nextSibling.disabled &&
                                !nextSibling.requiresInput &&
                                workflowNodeStates[nextSibling.id] === "pending"
                            ) {
                                workflowNodeStates[nextSibling.id] = "active";
                            }
                        }
                        // Check if all siblings done → mark parent completed → auto-advance past parent
                        var allChildrenDone = children.every(function (c) {
                            return workflowNodeStates[c.id] === "completed";
                        });
                        if (
                            allChildrenDone &&
                            workflowNodeStates[parentId] !== "completed"
                        ) {
                            workflowNodeStates[parentId] = "completed";
                            var pIdx = WORKFLOW_STEPS.findIndex(function (s) {
                                return s.id === parentId;
                            });
                            if (pIdx > workflowHighestCompleted)
                                workflowHighestCompleted = pIdx;
                            if (pIdx >= 0 && pIdx < WORKFLOW_STEPS.length - 1) {
                                var afterParent = WORKFLOW_STEPS[pIdx + 1];
                                if (
                                    !afterParent.disabled &&
                                    !afterParent.requiresInput &&
                                    workflowNodeStates[afterParent.id] ===
                                        "pending"
                                ) {
                                    workflowNodeStates[afterParent.id] =
                                        "active";
                                }
                            }
                        }
                    } else {
                        // Top-level step completed: flat auto-advance to next top-level step
                        if (idx >= 0 && idx < WORKFLOW_STEPS.length - 1) {
                            var next = WORKFLOW_STEPS[idx + 1];
                            if (
                                !next.disabled &&
                                !next.requiresInput &&
                                workflowNodeStates[next.id] === "pending"
                            ) {
                                workflowNodeStates[next.id] = "active";
                            }
                        }
                    }
                }
                renderWorkflow();
            }

            function _syncEquivCalcSubsteps(hasOrig, hasEq) {
                // Sub-steps are marked by SSE equiv_formula_line events during step2.
                // Only bulk-complete when equivalent data confirms step2 ran to completion.
                if (hasEq) {
                    updateWorkflowNode("equiv_calc_sub1", "completed");
                    updateWorkflowNode("equiv_calc_sub2", "completed");
                    updateWorkflowNode("equiv_calc_sub3", "completed");
                    updateWorkflowNode("equiv_calc", "completed");
                }
            }

            function syncWorkflowFromSession(sessionData) {
                initWorkflow(); // reset all nodes first, then apply session-specific state
                var hasTopology = !!(
                    sessionData.original_topology ||
                    sessionData.equivalent_topology
                );
                var hasOrigTopo = !!sessionData.original_topology;
                var hasEqTopo = !!sessionData.equivalent_topology;
                var hasModel = !!(
                    sessionData.original_training_model ||
                    sessionData.equivalent_training_model ||
                    (typeof modelOriginal !== "undefined" && modelOriginal) ||
                    (typeof modelEquivalent !== "undefined" && modelEquivalent)
                );
                var hasSimulation = !!(
                    sessionData.original_simulation ||
                    sessionData.equivalent_simulation
                );
                var hasComparison = !!sessionData.comparison_report;
                var step = sessionData.step || "idle";

                if (hasComparison) {
                    updateWorkflowNode("params", "completed");
                    _syncEquivCalcSubsteps(true, true);
                    updateWorkflowNode("equiv_gen", "completed");
                    updateWorkflowNode("simulation", "completed");
                    if (sessionData.comparison_equivalent === false) {
                        updateWorkflowNode("comparison", "failed");
                    } else {
                        updateWorkflowNode("comparison", "completed");
                    }
                } else if (hasSimulation) {
                    updateWorkflowNode("params", "completed");
                    _syncEquivCalcSubsteps(true, true);
                    updateWorkflowNode("equiv_gen", "completed");
                    updateWorkflowNode("simulation", "completed");
                    updateWorkflowNode("comparison", "active");
                } else if (hasModel && hasTopology) {
                    updateWorkflowNode("params", "completed");
                    _syncEquivCalcSubsteps(hasOrigTopo, hasEqTopo);
                    if (hasEqTopo) {
                        updateWorkflowNode("equiv_gen", "completed");
                        updateWorkflowNode("simulation", "active");
                    } else if (
                        workflowNodeStates["equiv_calc"] !== "completed"
                    ) {
                        updateWorkflowNode("equiv_calc", "active");
                    }
                } else if (hasTopology) {
                    updateWorkflowNode("params", "completed");
                    if (hasEqTopo) {
                        _syncEquivCalcSubsteps(true, true);
                        updateWorkflowNode("equiv_gen", "completed");
                        updateWorkflowNode("simulation", "active");
                    } else if (hasOrigTopo) {
                        _syncEquivCalcSubsteps(true, false);
                        updateWorkflowNode("equiv_calc", "active");
                    }
                } else if (
                    step === "params_collected" ||
                    step === "topology_generated"
                ) {
                    updateWorkflowNode("params", "completed");
                    updateWorkflowNode("equiv_calc", "active");
                }
                // else: nodes remain in initWorkflow() default state (waiting_input / pending)

                // Restore formula lines from sessionStorage if step2 was already completed
                if (
                    workflowNodeStates["equiv_calc"] === "completed" ||
                    workflowNodeStates["equiv_calc_sub3"] === "completed"
                ) {
                    try {
                        var saved = sessionStorage.getItem(
                            "formulaLines_" + sessionId,
                        );
                        if (saved) {
                            window._pendingFormulaLines = JSON.parse(saved);
                            _formulaCardReady = true;
                        }
                    } catch (e) {
                        /* ignore parse errors */
                    }
                }
            }

                var tpSelect = document.getElementById(tpSelectId);

            }

            function updateEquivalentModelL() {
                var origL =
                    parseInt(
                        document.getElementById("wf-orig-model-l").value,
                    ) || 0;
                var origPP =
                    parseInt(document.getElementById("wf-orig-pp").value) || 1;
                var equivLInput = document.getElementById("wf-equiv-model-l");
                if (origPP <= 3) {
                    equivLInput.value = origL;
                } else {
                    equivLInput.value = Math.floor(origL / origPP) * 3;
                }
                document.getElementById("wf-equiv-model-h").value =
                    document.getElementById("wf-orig-model-h").value;
                document.getElementById("wf-equiv-model-a").value =
                    document.getElementById("wf-orig-model-a").value;
            }

            function openWorkflowParams() {
                var overlay = document.getElementById("workflow-param-overlay");
                if (overlay) overlay.style.display = "flex";
                syncTP("wf-orig-device", "wf-orig-tp");
                var device = document.getElementById("wf-orig-device").value;
                var options = TP_OPTIONS[device] || [16];
                document.getElementById("wf-equiv-tp").value = options[0];
                updateEquivalentModelL();
            }

            function closeWorkflowParams() {
                var overlay = document.getElementById("workflow-param-overlay");
                if (overlay) overlay.style.display = "none";
            }

            function submitWorkflowParams() {
                var origDevice =
                    document.getElementById("wf-orig-device").value;
                var origDp = document.getElementById("wf-orig-dp").value;
                var origTp = document.getElementById("wf-orig-tp").value;
                var origPp = document.getElementById("wf-orig-pp").value;
                var origModelName =
                    document.getElementById("wf-orig-model-name").value;
                var origL = document.getElementById("wf-orig-model-l").value;
                var origH = document.getElementById("wf-orig-model-h").value;
                var origA = document.getElementById("wf-orig-model-a").value;
                var origS = document.getElementById("wf-orig-model-s").value;
                var origB = document.getElementById("wf-orig-model-b").value;
                var strategy =
                    document.getElementById("wf-equiv-strategy").value;
                closeWorkflowParams();
                updateWorkflowNode("params", "completed");
                updateWorkflowNode("equiv_calc", "active");

                if (workflowMode === "api") {
                    submitStep1({
                        device_type: origDevice,
                        dp: parseInt(origDp),
                        tp: parseInt(origTp),
                        pp: parseInt(origPp),
                        model_name: origModelName,
                        L: parseInt(origL),
                        H: parseInt(origH),
                        A: parseInt(origA),
                        S: parseInt(origS),
                        B: parseInt(origB),
                        strategy: strategy,
                    });
                } else {
                    var msg =
                        "原始组网: 设备类型" +
                        origDevice +
                        ", DP=" +
                        origDp +
                        ", TP=" +
                        origTp +
                        ", PP=" +
                        origPp +
                        ", 模型名称=" +
                        origModelName +
                        ", L=" +
                        origL +
                        ", H=" +
                        origH +
                        ", A=" +
                        origA +
                        ", S=" +
                        origS +
                        ", B=" +
                        origB +
                        " | 等效策略: " +
                        strategy;
                    sendMessage(msg, {
                        original_model_name: origModelName,
                        original_seq_len: parseInt(origS) || 2048,
                        original_batch_size: parseInt(origB) || 32,
                        strategy: strategy,
                    });
                }
            }

                    document.getElementById("wf-orig-device")?.value || "A3";
                var DEVICE_MAP = {
                    A2: "ASCEND_910A",

                };
                return {
                    epoch_num: 1,

                    device_type: DEVICE_MAP[topoDevice] || "ASCEND_910B",

                    rank: 0,
                    rank_range: 1023,
                    comp_filepath: "/opt/traffic_modeling/aicm/default.txt",
                    no_time_accumulation: false,
                    level0_config: null,
                    level1_config: null,

                    comm_group_output: true,
                    debug_time: false,

            function populateSimForm(params) {

                    params.epoch_num || 1;

            async function openSimParams() {
                var overlay = document.getElementById("sim-param-overlay");
                if (!overlay) return;
                // Try loading saved params from backend
                try {
                    var resp = await fetch(
                        API + "/session/" + sessionId + "/simulation-params",
                    );
                    if (resp.ok) {
                        var data = await resp.json();
                        if (data.simulation_params) {
                            populateSimForm(data.simulation_params);
                            overlay.style.display = "flex";
                            return;
                        }
                    }
                } catch (e) {}
                // Fallback: populate with defaults
                populateSimForm(getDefaultSimParams());
                overlay.style.display = "flex";
            }

            function closeSimParams() {
                var overlay = document.getElementById("sim-param-overlay");
                if (overlay) overlay.style.display = "none";
            }

            function submitSimParams() {
                var params = getSimParamsFromForm();
                closeSimParams();
                startSimulation(params);
                // Also save params via API for persistence
                fetch(API + "/session/" + sessionId + "/simulation-params", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(params),
                }).catch(function () {});
            }

            // ── Workflow-Chat Resize Handle ──
            (function () {
                var handle = document.getElementById("wf-resize-handle");
                var workflow = document.querySelector(".workflow-panel");
                var rightPanel = document.querySelector(".panel-right");
                if (!handle || !workflow || !rightPanel) return;

                var startY = 0,
                    startH = 0;
                var minH = 200;
                var maxH = function () {
                    var rightRect = rightPanel.getBoundingClientRect();
                    // allow workflow to take up to right panel height minus chat header (40px) minus handle (6px)
                    return rightRect.height - 46;
                };

                handle.addEventListener("mousedown", function (e) {
                    e.preventDefault();
                    startY = e.clientY;
                    startH = workflow.offsetHeight;
                    handle.classList.add("active");
                    document.body.style.cursor = "ns-resize";
                    document.body.style.userSelect = "none";

                    function onMove(ev) {
                        var dy = ev.clientY - startY;
                        var newH = startH + dy;
                        if (newH < minH) newH = minH;
                        var max = maxH();
                        if (newH > max) newH = max;
                        workflow.style.height = newH + "px";
                        renderWorkflow();
                    }

                    function onUp() {
                        handle.classList.remove("active");
                        document.body.style.cursor = "";
                        document.body.style.userSelect = "";
                        document.removeEventListener("mousemove", onMove);
                        document.removeEventListener("mouseup", onUp);
                    }

                    document.addEventListener("mousemove", onMove);
                    document.addEventListener("mouseup", onUp);
                });
            })();

            // ── History ──
            var _historyCache = [];

            function statusBadge(step) {
                if (step === "completed") return ["done", "已完成"];
                if (step === "idle" || step === "draft")
                    return ["draft", "草稿"];
                return ["running", "运行中"];
            }

            function timeAgo(iso) {
                if (!iso) return "";
                var diff = Date.now() - new Date(iso).getTime();
                var mins = Math.floor(diff / 60000);
                if (mins < 1) return "刚刚";
                if (mins < 60) return mins + " 分钟前";
                var hours = Math.floor(mins / 60);
                if (hours < 24) return hours + " 小时前";
                return Math.floor(hours / 24) + " 天前";
            }

            async function renderHistory() {
                const list = document.getElementById("history-list");
                try {
                    const resp = await fetch(API + "/session/summaries");
                    if (!resp.ok) throw new Error("HTTP " + resp.status);
                    _historyCache = await resp.json();
                } catch (e) {
                    _historyCache = [];
                }
                document.getElementById("history-count").textContent =
                    _historyCache.length;
                if (_historyCache.length === 0) {
                    list.innerHTML =
                        '<div class="history-empty">暂无历史任务</div>';
                    return;
                }
                list.innerHTML = _historyCache
                    .map(function (h) {
                        var badge = statusBadge(h.step);
                        var isActive = h.session_id === sessionId;
                        return (
                            '<div class="history-item ' +
                            (isActive ? "active" : "") +
                            ' fade-in">' +
                            '<div class="history-item-main" onclick="selectHistory(\'' +
                            h.session_id +
                            "')\">" +
                            '<div class="history-item-title">' +
                            (h.title || "新建任务") +
                            "</div>" +
                            '<div class="history-item-meta">' +
                            "<span>" +
                            timeAgo(h.updated_at) +
                            "</span>" +
                            '<span class="history-badge badge-' +
                            badge[0] +
                            '">' +
                            badge[1] +
                            "</span>" +
                            "</div></div>" +
                            '<button class="history-delete" onclick="deleteHistory(event, \'' +
                            h.session_id +
                            '\')" title="删除">×</button>' +
                            "</div>"
                        );
                    })
                    .join("");
            }

            async function selectHistory(id) {
                if (id === sessionId) return;
                if (await restoreSession(id)) {
                    renderHistory();
                }
            }

            async function deleteHistory(e, id) {
                e.stopPropagation();
                if (!confirm("确定要删除此任务？此操作不可撤销。")) return;
                try {
                    await fetch(API + "/session/" + id, { method: "DELETE" });
                } catch (err) {}
                if (id === sessionId) {
                    sessionId = "";
                    localStorage.removeItem("mesh_session");
                    newSession();
                }
                renderHistory();
            }

            // ── Session ──
            async function ensureSession() {
                if (sessionId) return sessionId;
                const resp = await fetch(`${API}/session`, { method: "POST" });
                const data = await resp.json();
                sessionId = data.session_id;
                document.getElementById("session-id-display").textContent =
                    sessionId;
                localStorage.setItem(
                    "mesh_session",
                    JSON.stringify({
                        id: sessionId,
                        boot: data.server_boot_id || "",
                    }),
                );
                return sessionId;
            }

            async function restoreSession(id) {
                try {
                    const resp = await fetch(`${API}/session/${id}/topology`);
                    if (!resp.ok) {
                        if (resp.status === 404) {
                            localStorage.removeItem("mesh_session");
                        }
                        return false;
                    }
                    const data = await resp.json();

                    // Detect server restart: if boot id changed, discard old session
                    const saved = JSON.parse(
                        localStorage.getItem("mesh_session") || "{}",
                    );
                    if (
                        data.server_boot_id &&
                        saved.boot &&
                        data.server_boot_id !== saved.boot
                    ) {
                        localStorage.removeItem("mesh_session");
                        return false;
                    }

                    sessionId = id;
                    document.getElementById("session-id-display").textContent =
                        sessionId;
                    localStorage.setItem(
                        "mesh_session",
                        JSON.stringify({
                            id: sessionId,
                            boot: data.server_boot_id || saved.boot || "",
                        }),
                    );

                    // Clear old session's topology/model state before restoring new one
                    meshOriginal = null;
                    meshEquivalent = null;
                    modelOriginal = null;
                    modelEquivalent = null;
                    meshActualOrig = {};
                    meshActualEq = {};
                    meshEstimateOrig = {};
                    meshEstimateEq = {};
                    meshModelOrig = {};
                    meshModelEq = {};
                    _pendingMeshList = [];
                    _pendingModelList = [];

                    // Restore training model data first (synchronous), so canvasRebuild sees them
                    if (data.original_training_model) {
                        data.original_training_model._role = "original";
                        loadModelData(data.original_training_model, "original");
                    }
                    if (data.equivalent_training_model) {
                        data.equivalent_training_model._role = "equivalent";
                        loadModelData(
                            data.equivalent_training_model,
                            "equivalent",
                        );
                    }

                    // Restore topology data
                    if (data.original_topology) {
                        await loadMeshData(data.original_topology);
                    }
                    if (data.equivalent_topology)
                        await loadMeshData(data.equivalent_topology);

                    // Sync workflow from session state (may restore formula lines + set _formulaCardReady)
                    syncWorkflowFromSession(data);

                    if (meshOriginal || meshEquivalent) canvasRebuild();

                    // Restore chat message for topology summaries
                    const parts = [];
                    if (data.original_topology)
                        parts.push(
                            "原始组网: " +
                                (data.original_topology.name || "") +
                                " 已恢复",
                        );
                    if (data.equivalent_topology)
                        parts.push(
                            "等效组网: " +
                                (data.equivalent_topology.name || "") +
                                " 已恢复",
                        );
                    if (data.original_training_model)
                        parts.push(
                            "原始模型: " +
                                (data.original_training_model.layers_count ||
                                    data.original_training_model.layers
                                        ?.length ||
                                    0) +
                                " 层 已恢复",
                        );
                    if (data.equivalent_training_model)
                        parts.push(
                            "等效模型: " +
                                (data.equivalent_training_model.layers_count ||
                                    data.equivalent_training_model.layers
                                        ?.length ||
                                    0) +
                                " 层 已恢复",
                        );
                    // Restore conversation messages from server (user + agent only)
                    if (data.messages && data.messages.length > 0) {
                        document.getElementById("chat-messages").innerHTML = "";
                        for (const msg of data.messages) {
                            const role = msg.role || "";
                            if (role === "tool") continue;
                            const content = msg.content || "";
                            const displayRole =
                                role === "assistant" ? "agent" : role;
                            addMessage(displayRole, content);
                        }
                    } else if (parts.length > 0) {
                        addMessage(
                            "system",
                            "🔄 会话 " + id + " 已恢复\n" + parts.join("\n"),
                        );
                    }

                    _simCompleted = !!(
                        data.original_simulation && data.equivalent_simulation
                    );
                    checkSimReady();
                    fetchSimulationData();

                    // Restore active canvas tab from sessionStorage
                    var savedTab = sessionStorage.getItem("activeCanvasTab");
                    if (savedTab === "simulation" && (meshOriginal || meshEquivalent)) {
                        setTimeout(function () { switchCanvasTab("simulation"); }, 100);
                    }
                    return true;
                } catch (e) {
                    // Network error or parse error — keep cached session
                    return false;
                }
            }
