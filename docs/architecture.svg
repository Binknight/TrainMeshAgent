<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="'Segoe UI','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="880" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <rect x="0" y="0" width="1200" height="52" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="1200" height="22" fill="url(#headerGrad)"/>
  <text x="600" y="34" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">TrainMesh Agent — 系统架构图 (Agentic Service Architecture)</text>

  <!-- ==================== LAYER 1: WEB FRONTEND ==================== -->
  <rect x="30" y="72" width="1140" height="110" rx="10" fill="#eef2ff" stroke="#818cf8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="95" fill="#4338ca" font-size="14" font-weight="bold">🌐 前端展示层 (Web Frontend)</text>

  <!-- Chat Interface -->
  <rect x="50" y="105" width="340" height="65" rx="8" fill="#fff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="220" y="127" text-anchor="middle" fill="#3730a3" font-size="12" font-weight="bold">💬 Agent 交互面板</text>
  <text x="220" y="145" text-anchor="middle" fill="#6b7280" font-size="10">Cursor-IDE 风格自然语言交互</text>
  <text x="220" y="160" text-anchor="middle" fill="#6b7280" font-size="10">支持多轮对话 · 上下文记忆</text>

  <!-- Topology Render -->
  <rect x="420" y="105" width="340" height="65" rx="8" fill="#fff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="590" y="127" text-anchor="middle" fill="#3730a3" font-size="12" font-weight="bold">🗺️ 组网拓扑渲染</text>
  <text x="590" y="145" text-anchor="middle" fill="#6b7280" font-size="10">原始组网 / 等效组网 可视化</text>
  <text x="590" y="160" text-anchor="middle" fill="#6b7280" font-size="10">拓扑图对比 · 差异高亮标注</text>

  <!-- Results Panel -->
  <rect x="790" y="105" width="360" height="65" rx="8" fill="#fff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="970" y="127" text-anchor="middle" fill="#3730a3" font-size="12" font-weight="bold">📊 仿真结果面板</text>
  <text x="970" y="145" text-anchor="middle" fill="#6b7280" font-size="10">计算强度 / 内存占用 / 通信流量</text>
  <text x="970" y="160" text-anchor="middle" fill="#6b7280" font-size="10">等效性对比分析 · 误差可视化</text>

  <!-- Arrow: Frontend → Agent Core -->
  <line x1="600" y1="182" x2="600" y2="210" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="615" y="200" fill="#3b82f6" font-size="10">WebSocket / REST</text>

  <!-- ==================== LAYER 2: AGENT CORE ==================== -->
  <rect x="30" y="212" width="1140" height="290" rx="10" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="238" fill="#1d4ed8" font-size="14" font-weight="bold">🧠 Agent 核心服务层 (Agent Core Service)</text>

  <!-- Guardrails -->
  <rect x="50" y="250" width="260" height="58" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2"/>
  <text x="180" y="268" text-anchor="middle" fill="#c2410c" font-size="11" font-weight="bold">🛡️ 输入护栏 Input Guard</text>
  <text x="180" y="283" text-anchor="middle" fill="#6b7280" font-size="9">校验设备类型(A2/A3/A5)</text>
  <text x="180" y="297" text-anchor="middle" fill="#6b7280" font-size="9">DP/TP/PP 合法性检查</text>

  <rect x="330" y="250" width="260" height="58" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2"/>
  <text x="460" y="268" text-anchor="middle" fill="#c2410c" font-size="11" font-weight="bold">🛡️ 输出护栏 Output Guard</text>
  <text x="460" y="283" text-anchor="middle" fill="#6b7280" font-size="9">JSON 结构完整性校验</text>
  <text x="460" y="297" text-anchor="middle" fill="#6b7280" font-size="9">不符合规范自动重生成</text>

  <!-- Session Manager -->
  <rect x="610" y="250" width="260" height="58" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="740" y="268" text-anchor="middle" fill="#166534" font-size="11" font-weight="bold">📋 会话管理器</text>
  <text x="740" y="283" text-anchor="middle" fill="#6b7280" font-size="9">承载原始组网 + 等效组网</text>
  <text x="740" y="297" text-anchor="middle" fill="#6b7280" font-size="9">上下文持久化 · 状态追踪</text>

  <!-- LLM Orchestrator -->
  <rect x="890" y="250" width="260" height="58" rx="6" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1.2"/>
  <text x="1020" y="268" text-anchor="middle" fill="#9d174d" font-size="11" font-weight="bold">🤖 LLM 编排器</text>
  <text x="1020" y="283" text-anchor="middle" fill="#6b7280" font-size="9">意图识别 · 任务分解</text>
  <text x="1020" y="297" text-anchor="middle" fill="#6b7280" font-size="9">Skill 调度 · 工具调用决策</text>

  <!-- Skills Section -->
  <rect x="50" y="320" width="520" height="95" rx="8" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.2"/>
  <text x="70" y="340" fill="#166534" font-size="12" font-weight="bold">🔧 Skill 技能库</text>

  <rect x="70" y="350" width="230" height="55" rx="5" fill="#fff" stroke="#a7f3d0" stroke-width="1"/>
  <text x="185" y="367" text-anchor="middle" fill="#065f46" font-size="10" font-weight="bold">training-mesh-gen-skill</text>
  <text x="185" y="382" text-anchor="middle" fill="#6b7280" font-size="8">组网生成 Skill</text>
  <text x="185" y="396" text-anchor="middle" fill="#6b7280" font-size="8">输入参数 → 结构化 JSON 组网图</text>

  <rect x="320" y="350" width="230" height="55" rx="5" fill="#fff" stroke="#a7f3d0" stroke-width="1"/>
  <text x="435" y="367" text-anchor="middle" fill="#065f46" font-size="10" font-weight="bold">training-mesh-profiler-skill</text>
  <text x="435" y="382" text-anchor="middle" fill="#6b7280" font-size="8">组网性能分析 Skill</text>
  <text x="435" y="396" text-anchor="middle" fill="#6b7280" font-size="8">仿真结果 → 强度/内存/通信指标</text>

  <!-- MCP Client -->
  <rect x="600" y="320" width="550" height="95" rx="8" fill="#ecfeff" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="620" y="340" fill="#155e75" font-size="12" font-weight="bold">🔌 MCP 客户端层 (MCP Client Layer)</text>

  <rect x="620" y="350" width="125" height="55" rx="5" fill="#fff" stroke="#a5f3fc" stroke-width="1"/>
  <text x="682" y="367" text-anchor="middle" fill="#0e7490" font-size="9" font-weight="bold">🔗 连接管理</text>
  <text x="682" y="382" text-anchor="middle" fill="#6b7280" font-size="8">MCP 协议</text>
  <text x="682" y="396" text-anchor="middle" fill="#6b7280" font-size="8">连接池</text>

  <rect x="760" y="350" width="125" height="55" rx="5" fill="#fff" stroke="#a5f3fc" stroke-width="1"/>
  <text x="822" y="367" text-anchor="middle" fill="#0e7490" font-size="9" font-weight="bold">📤 任务下发</text>
  <text x="822" y="382" text-anchor="middle" fill="#6b7280" font-size="8">仿真任务</text>
  <text x="822" y="396" text-anchor="middle" fill="#6b7280" font-size="8">参数配置</text>

  <rect x="900" y="350" width="125" height="55" rx="5" fill="#fff" stroke="#a5f3fc" stroke-width="1"/>
  <text x="962" y="367" text-anchor="middle" fill="#0e7490" font-size="9" font-weight="bold">📥 结果回收</text>
  <text x="962" y="382" text-anchor="middle" fill="#6b7280" font-size="8">状态上报</text>
  <text x="962" y="396" text-anchor="middle" fill="#6b7280" font-size="8">日志同步</text>

  <rect x="1040" y="350" width="95" height="55" rx="5" fill="#fff" stroke="#a5f3fc" stroke-width="1"/>
  <text x="1087" y="367" text-anchor="middle" fill="#0e7490" font-size="9" font-weight="bold">📄 数据拉取</text>
  <text x="1087" y="382" text-anchor="middle" fill="#6b7280" font-size="8">仿真详情</text>
  <text x="1087" y="396" text-anchor="middle" fill="#6b7280" font-size="8">单卡数据</text>

  <!-- Internal arrows in Agent Core -->
  <line x1="310" y1="279" x2="325" y2="279" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="590" y1="279" x2="605" y2="279" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Arrow: Agent Core → MCP Server -->
  <line x1="600" y1="502" x2="600" y2="532" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="615" y="522" fill="#3b82f6" font-size="10">MCP 协议 (JSON-RPC)</text>

  <!-- ==================== LAYER 3: MCP SERVER / SIMULATION ==================== -->
  <rect x="30" y="535" width="1140" height="195" rx="10" fill="#fef2f2" stroke="#f87171" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="560" fill="#991b1b" font-size="14" font-weight="bold">⚙️ MCP Server — 仿真系统 (Simulation System · Python 独立程序)</text>

  <!-- MCP Tools -->
  <rect x="50" y="575" width="1100" height="65" rx="8" fill="#fff" stroke="#fca5a5" stroke-width="1"/>

  <!-- Tool cards -->
  <rect x="65" y="585" width="170" height="42" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="0.8"/>
  <text x="150" y="602" text-anchor="middle" fill="#991b1b" font-size="9" font-weight="bold">🚀 execute_task</text>
  <text x="150" y="617" text-anchor="middle" fill="#6b7280" font-size="8">下发并执行仿真任务</text>

  <rect x="250" y="585" width="170" height="42" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="0.8"/>
  <text x="335" y="602" text-anchor="middle" fill="#991b1b" font-size="9" font-weight="bold">📡 report_status</text>
  <text x="335" y="617" text-anchor="middle" fill="#6b7280" font-size="8">实时状态上报</text>

  <rect x="435" y="585" width="170" height="42" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="0.8"/>
  <text x="520" y="602" text-anchor="middle" fill="#991b1b" font-size="9" font-weight="bold">📜 sync_logs</text>
  <text x="520" y="617" text-anchor="middle" fill="#6b7280" font-size="8">日志同步到 Agent</text>

  <rect x="620" y="585" width="170" height="42" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="0.8"/>
  <text x="705" y="602" text-anchor="middle" fill="#991b1b" font-size="9" font-weight="bold">📊 get_result</text>
  <text x="705" y="617" text-anchor="middle" fill="#6b7280" font-size="8">仿真结果数据</text>

  <rect x="805" y="585" width="170" height="42" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="0.8"/>
  <text x="890" y="602" text-anchor="middle" fill="#991b1b" font-size="9" font-weight="bold">🖥️ card_detail</text>
  <text x="890" y="617" text-anchor="middle" fill="#6b7280" font-size="8">单卡详情查询</text>

  <rect x="990" y="585" width="145" height="42" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="0.8"/>
  <text x="1062" y="602" text-anchor="middle" fill="#991b1b" font-size="9" font-weight="bold">🔄 manage_session</text>
  <text x="1062" y="617" text-anchor="middle" fill="#6b7280" font-size="8">会话生命周期管理</text>

  <!-- Simulation Engine -->
  <rect x="50" y="650" width="1100" height="70" rx="8" fill="#fff1f2" stroke="#fda4af" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="70" y="672" fill="#9f1239" font-size="12" font-weight="bold">🧮 Python 仿真引擎 (Simulation Engine)</text>
  <text x="70" y="692" fill="#6b7280" font-size="10">仿真计算核心：集群拓扑构建 → 分布式训练模拟 → 通信模式生成 → 资源消耗计算</text>
  <text x="70" y="708" fill="#6b7280" font-size="10">输出指标：单卡计算强度 (TFLOPS) · 单卡内存占用 (GB) · 节点间通信流量 (GB/s)</text>

  <!-- ==================== LAYER 4: DATA / STORAGE ==================== -->
  <rect x="30" y="745" width="1140" height="60" rx="10" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="770" fill="#5b21b6" font-size="14" font-weight="bold">💾 数据持久层</text>

  <rect x="50" y="780" width="250" height="18" rx="4" fill="#ede9fe"/>
  <text x="175" y="793" text-anchor="middle" fill="#5b21b6" font-size="9">会话历史 · 拓扑快照</text>

  <rect x="320" y="780" width="250" height="18" rx="4" fill="#ede9fe"/>
  <text x="445" y="793" text-anchor="middle" fill="#5b21b6" font-size="9">仿真结果 · 对比分析报告</text>

  <rect x="590" y="780" width="250" height="18" rx="4" fill="#ede9fe"/>
  <text x="715" y="793" text-anchor="middle" fill="#5b21b6" font-size="9">Skill 执行日志 · 审计追踪</text>

  <rect x="860" y="780" width="290" height="18" rx="4" fill="#ede9fe"/>
  <text x="1005" y="793" text-anchor="middle" fill="#5b21b6" font-size="9">MCP 连接配置 · 仿真参数模板</text>

  <!-- Legend -->
  <rect x="30" y="820" width="1140" height="48" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="50" y="840" fill="#374151" font-size="10" font-weight="bold">图例：</text>
  <rect x="100" y="828" width="14" height="14" rx="2" fill="#eef2ff" stroke="#818cf8" stroke-width="1"/>
  <text x="120" y="840" fill="#6b7280" font-size="9">前端层</text>
  <rect x="170" y="828" width="14" height="14" rx="2" fill="#eff6ff" stroke="#60a5fa" stroke-width="1"/>
  <text x="190" y="840" fill="#6b7280" font-size="9">Agent 核心层</text>
  <rect x="280" y="828" width="14" height="14" rx="2" fill="#fef2f2" stroke="#f87171" stroke-width="1"/>
  <text x="300" y="840" fill="#6b7280" font-size="9">仿真系统</text>
  <rect x="385" y="828" width="14" height="14" rx="2" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="405" y="840" fill="#6b7280" font-size="9">数据层</text>
  <line x1="480" y1="835" x2="510" y2="835" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="518" y="840" fill="#6b7280" font-size="9">数据/控制流</text>
  <line x1="600" y1="835" x2="630" y2="835" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="638" y="840" fill="#6b7280" font-size="9">护栏检查</text>
  <line x1="720" y1="835" x2="750" y2="835" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="758" y="840" fill="#6b7280" font-size="9">验证通过</text>
</svg>